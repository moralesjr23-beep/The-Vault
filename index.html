function calcStreak(){
  if(!state.wearHistory.length)return 0;
  const days=new Set(state.wearHistory.map(w=>new Date(w.date).toDateString()));
  let streak=0;
  let d=new Date();
  while(days.has(d.toDateString())){streak++;d.setDate(d.getDate()-1)}
  return streak
}

// ============ ISO E SUPER LAYERING INTELLIGENCE ============
// Reads from state.collection (your 198 bottles), enriches with ISO_E_DATA by name match,
// and adds Iso E-specific scoring, weather, and layering UX. All scoped to .isoe-* CSS.
const ISO_E_NORM=Object.fromEntries(ISO_E_DATA.map(d=>[d.n.toLowerCase().replace(/[^a-z0-9]/g,''),d]));
// Manual aliases for known Sillage↔Iso E name divergences (typos, abbreviations, accents)
const ISO_E_ALIASES={
  'silver':'silveroil',
  'yourtouchsandal':'yourtouchsantal',
  'elixirposeidonclassicpineapple':'elixirofposeidonsclassicpineapple',
  'imperialematrix':'imperialematrix', // canonicalize é→e
  'imperialmatrix':'imperialematrix'
};
const ISO_E_FUZZY=Object.fromEntries(ISO_E_DATA.map(d=>{
  const noise=new Set(['the','of','at','in','by','with','a','an','de','le','la']);
  const k=d.n.toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(t=>t&&!noise.has(t)).sort().join('');
  return [k,d];
}));
const ISO_E_COMBOS=[
  {name:'Spring Daily Driver',frags:['Ottoman Breeze','His Perspective'],ratio:'2 + 2 sprays',ctx:'Aromatic woody base from Hacivat-style Ottoman Breeze, layered with the fresh-clean Perspective backbone. Year-round but peaks in spring on warm days. Iso E Super lifts both — adds 2-3 hours of projection.'},
  {name:'Poseidon\'s Day Stack',frags:['Poseidon\'s Swimming Cologne','His Perspective'],ratio:'2 + 2 sprays',ctx:'Aventus Cologne x Afternoon Swim freshness over Perspective\'s ambrox base. Daytime fresh stacking — Iso E Super extends the volatile citrus opening significantly.'},
  {name:'Spicy Fireplace (Evening)',frags:['Jean Lowe Immortal','Ameer Al Oudh Intense'],ratio:'2 : 1',ctx:'JLI cool aromatic woods grounded by Ameer Al Oudh\'s smoky-tobacco fireplace. Cold-weather evening only — overpowers in heat. Iso E reinforces the cedrene-resin backbone.'},
  {name:'Winter Glacier',frags:['Glacier Le Noir','Poseidon\'s Swimming Cologne'],ratio:'2 + 1 sprays',ctx:'JPG Le Male Le Parfum DNA + Aventus Cologne lift. Heavy lavender-vanilla anchored, then brightened. Iso E adds woody depth without breaking the gourmand cool.'}
];
function isoENorm(s){return (s||'').toLowerCase().replace(/[^a-z0-9]/g,'')}
// Tokenized normalizer for fuzzy matching — strips noise words and ordering
function isoENormTokens(s){
  const noise=new Set(['the','of','at','in','by','with','a','an','de','le','la']);
  return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(t=>t&&!noise.has(t)).sort().join('')
}
function isoEEnrich(f){
  const norm=isoENorm(f.name);
  // Try exact
  const exact=ISO_E_NORM[norm];
  if(exact)return {...f,...exact,_iso:exact};
  // Try alias
  const aliased=ISO_E_ALIASES[norm];
  if(aliased&&ISO_E_NORM[aliased])return {...f,...ISO_E_NORM[aliased],_iso:ISO_E_NORM[aliased]};
  // Try fuzzy by sorted tokens with noise words stripped
  const fuzzy=ISO_E_FUZZY[isoENormTokens(f.name)];
  if(fuzzy)return {...f,...fuzzy,_iso:fuzzy};
  // Last resort: substring/superstring match
  for(const [k,v] of Object.entries(ISO_E_NORM)){
    if(k.length>=8&&norm.length>=8&&(k.startsWith(norm)||norm.startsWith(k))){
      return {...f,...v,_iso:v};
    }
  }
  // Fallback: derive Iso E fields from existing DNA
  const fam=isoEFamFromDna(f.dna||[]);
  return {...f,n:f.name,h:f.house,ib:f.inspiration,fl:f.flag||'DISTINCT',v:'YES',b:'DEPTH, LONG',sp:2,w:'Chest',dna:(f.dna||[]).join(', ').toLowerCase(),fam,imp:'',sc:isoEDefaultScore(fam),se:f.season,oc:(f.occasions||[]).join(' / '),ti:'flexible',_inferred:true}
}
function isoEFamFromDna(dnaList){
  const map={'Citrus':'citrus','Aquatic':'aquatic','Aromatic':'aromatic','Blue':'aromatic','Chypre':'chypre','Floral':'floral','Fougere':'fougere','Fresh':'aquatic','Fruity':'fruity','Gourmand':'gourmand','Green':'green','Leather':'leather','Musk / Powdery':'musk','Oud':'oud','Spicy':'spicy','Sweet':'gourmand','Tobacco':'tobacco','Vanilla':'vanilla','Vetiver / Earthy':'vetiver','Woody':'woody','Amber':'amber'};
  return [...new Set((dnaList||[]).map(d=>map[d]).filter(Boolean))]
}
function isoEDefaultScore(fam){
  // Iso E shines on woody/aromatic/musk; fights gourmand/oud/strong vanilla
  let s=6;
  if(fam.includes('woody'))s+=1.5;
  if(fam.includes('aromatic'))s+=1;
  if(fam.includes('vetiver'))s+=1;
  if(fam.includes('chypre'))s+=1;
  if(fam.includes('musk'))s+=.5;
  if(fam.includes('fougere'))s+=.5;
  if(fam.includes('gourmand'))s-=1;
  if(fam.includes('oud'))s-=.5;
  if(fam.includes('vanilla'))s-=.5;
  return Math.max(3,Math.min(9,Math.round(s)))
}
// Decode benefit codes into human-readable labels + tooltips
const ISO_E_BENEFIT_MAP={
  AMP:{label:'Amplifies scent',desc:'Reinforces existing woody/aromatic notes via shared cedrene structure',cls:'amp'},
  LONG:{label:'Extends longevity',desc:'Heavy molecular weight slows evaporation, adding 2-3 hours of wear',cls:'long'},
  PROJ:{label:'Boosts projection',desc:'Diffusive cedarwood creates a wider sillage trail around the body',cls:'proj'},
  DEPTH:{label:'Adds depth',desc:'Builds an invisible woody scaffold beneath the composition',cls:'depth'},
  BIND:{label:'Fixative anchor',desc:'Lipophilic structure traps volatile top notes on skin',cls:'bind'},
  LIFT:{label:'Lifts composition',desc:'Adds airy radiance that carries notes further from skin',cls:'lift'}
};
function isoEParseBenefits(b){
  if(!b||b==='—')return [];
  return b.split(',').map(x=>x.trim()).filter(Boolean).map(code=>ISO_E_BENEFIT_MAP[code]||{label:code,desc:'',cls:''})
}
function isoEAllFrags(){
  // Reads from Sillage's collection; enriches each with Iso E data
  const customsByKey={};
  state.isoE.customs.forEach(c=>{customsByKey[c.n+'|||'+c.h]=c});
  const deletedSet=new Set(state.isoE.deleted);
  return state.collection
    .map(isoEEnrich)
    .filter(f=>!deletedSet.has(f.n+'|||'+f.h))
    .map(f=>{const o=customsByKey[f.n+'|||'+f.h];return o?{...f,...o,_overridden:true}:f})
}
function isoEKey(f){return f.n+'|||'+f.h}
function isoEIsFav(f){return state.isoE.favs.includes(isoEKey(f))}
function isoEIsHidden(f){return state.isoE.hidden.includes(isoEKey(f))}
function isoEWxAdj(f,wx){
  if(!wx)return 0;
  let a=0;const{temp,humidity,code}=wx;
  const fam=f.fam||[];
  const isLight=fam.some(x=>['citrus','aquatic','marine','green'].includes(x));
  const isHeavy=fam.some(x=>['gourmand','tobacco','oud','smoke','vanilla'].includes(x));
  const isWoody=fam.some(x=>['woody','vetiver','aromatic','fougere','chypre','incense'].includes(x));
  if(temp>85){if(isLight)a+=1;if(isHeavy)a-=1}
  else if(temp>75){if(isLight)a+=.5}
  else if(temp<45){if(isLight)a+=1;if(isHeavy)a+=.5}
  else if(temp<55){if(isLight)a+=.5}
  if(humidity>75){if(fam.includes('aquatic')||fam.includes('marine'))a-=1;if(isWoody)a+=.5}
  else if(humidity<30){if(isLight)a+=.5}
  if(code>=51&&code<=67){if(isWoody)a+=1}
  return Math.round(Math.max(-2,Math.min(2,a)))
}
function isoEScore(f){const adj=isoEWxAdj(f,state.weather);return Math.min(10,Math.max(1,(f.sc||6)+adj))}
function isoEScoreBreakdown(f){
  const base=f.sc||6;
  const adj=isoEWxAdj(f,state.weather);
  const final=Math.min(10,Math.max(1,base+adj));
  const fam=f.fam||[];
  let baseReason='';
  if(fam.includes('woody')||fam.includes('aromatic')||fam.includes('vetiver')){baseReason='Woody/aromatic DNA aligns directly with Iso E Super\'s cedrene structure.'}
  else if(fam.includes('chypre')||fam.includes('fougere')){baseReason='Chypre/fougere structure benefits from Iso E\'s transparent woody scaffold.'}
  else if(fam.includes('musk')){baseReason='Musk-forward composition gains diffusive lift from Iso E.'}
  else if(fam.includes('gourmand')||fam.includes('oud')){baseReason='Heavy gourmand/oud DNA mostly sits on top of Iso E without integration.'}
  else{baseReason='Mixed family — Iso E provides modest projection lift.'}
  let wxReason='No temperature adjustment — baseline scores apply';
  if(state.weather){
    const{temp,humidity,code}=state.weather;
    const isLight=fam.some(x=>['citrus','aquatic','marine','green'].includes(x));
    const isHeavy=fam.some(x=>['gourmand','tobacco','oud','smoke','vanilla'].includes(x));
    const isWoody=fam.some(x=>['woody','vetiver','aromatic','fougere','chypre','incense'].includes(x));
    const reasons=[];
    if(temp>85&&isLight)reasons.push('hot weather lifts light/citrus families');
    if(temp>85&&isHeavy)reasons.push('hot weather mutes heavy gourmand/tobacco');
    if(temp<45&&isLight)reasons.push('cold weather amplifies fresh families');
    if(temp<45&&isHeavy)reasons.push('cold weather rewards heavy gourmands');
    if(humidity>75&&isWoody)reasons.push('humid air projects woody compositions');
    if(humidity>75&&fam.includes('aquatic'))reasons.push('humid air mutes aquatic notes');
    if(code>=51&&code<=67&&isWoody)reasons.push('rain/drizzle amplifies woody depth');
    if(reasons.length)wxReason=reasons.join('; ')
  }
  return {base,adj,final,baseReason,wxReason}
}

function isoEControls(){
  const tabs=[['all','All'],['favs','Favs'],['distinct','Distinct'],['caution','Caution'],['hidden','Hidden'],['trash','Trash']];
  const sorts=[['house','House'],['score','Score'],['name','Name'],['sprays','Sprays']];

      ${state.isoE.legendDismissed?`<button class="btn sm secondary" data-action="isoeShowLegend" title="Show score legend">? Scores</button>`:''}

function isoEListHTML(){
  let list=isoEAllFrags();
  // Apply tab filter
  const tab=state.isoE.tab;
  if(tab==='favs')list=list.filter(isoEIsFav).filter(f=>!isoEIsHidden(f));
  else if(tab==='distinct')list=list.filter(f=>(f.fl||'').includes('DISTINCT')).filter(f=>!isoEIsHidden(f));
  else if(tab==='caution')list=list.filter(f=>['CAUTION','MUTED','OVERLAP','NEAR DUP','EXACT DUP'].some(x=>(f.fl||'').includes(x))||(f.b||'').includes('MUTED')).filter(f=>!isoEIsHidden(f));
  else if(tab==='hidden')list=list.filter(isoEIsHidden);
  else if(tab==='trash'){
    const deleted=new Set(state.isoE.deleted);
    list=state.collection.map(isoEEnrich).filter(f=>deleted.has(isoEKey(f)));
  }
  else list=list.filter(f=>!isoEIsHidden(f));
  // Search
  if(state.isoE.search){
    const q=state.isoE.search.toLowerCase();
    list=list.filter(f=>[f.n,f.h,f.ib,f.dna,(f.fam||[]).join(' ')].join(' ').toLowerCase().includes(q))
  }
  // Sort
  if(state.isoE.sort==='score'){list.sort((a,b)=>isoEScore(b)-isoEScore(a))}
  else if(state.isoE.sort==='name'){list.sort((a,b)=>a.n.localeCompare(b.n))}
  else if(state.isoE.sort==='sprays'){list.sort((a,b)=>(a.sp||2)-(b.sp||2))}
  if(!list.length)return `<div class="card empty">No fragrances match this filter.</div>`;
  // House grouping
  if(state.isoE.sort==='house'){
    const groups={};list.forEach(f=>(groups[f.h]=groups[f.h]||[]).push(f));
    return Object.keys(groups).sort().map(h=>{
      const isDefaultCollapsed=!state.isoE.search&&state.isoE.tab==='all';
      const openHouses=Array.isArray(state.isoE.openHouses)?state.isoE.openHouses:[];
      const collapsed=isDefaultCollapsed?!openHouses.includes(h):false;
      const entries=groups[h];
      const houseAvg=entries.length?(entries.reduce((s,f)=>s+isoEScore(f),0)/entries.length).toFixed(1):'—';
      return `<div class="isoe-house">
        <button class="isoe-house-h" data-action="isoeCollapseHouse" data-house="${esc(h)}">
          <span class="isoe-collapse-tri">${collapsed?'+':'−'}</span>
          <b>${esc(h)}</b><span class="small">${entries.length}</span>
          <span class="isoe-house-avg ${parseFloat(houseAvg)>=8?'high':parseFloat(houseAvg)<=4?'low':''}">avg ${houseAvg}</span>
        </button>
        ${collapsed?'':`<div class="isoe-cards">${entries.map(isoECard).join('')}</div>`}
      </div>`
    }).join('')
  }
  return `<div class="isoe-cards">${list.map(isoECard).join('')}</div>`
}
function isoECard(f){
  const sc=isoEScore(f);
  const adj=isoEWxAdj(f,state.weather);
  const scClass=sc>=8?'high':sc<=4?'low':'';
  const fav=isoEIsFav(f);
  const inTrash=state.isoE.tab==='trash';
  const inHidden=state.isoE.tab==='hidden';
  const breakdown=isoEScoreBreakdown(f);
  return `<div class="isoe-card ${f._inferred?'inferred':''}">
    <div class="isoe-card-head">
      <div style="flex:1;min-width:0">
        <div class="row" style="gap:6px;flex-wrap:wrap">${(f.fl||'').split(',').map(t=>t.trim()).filter(Boolean).map(t=>`<span class="isoe-flag ${t.replace(/[^a-z]/gi,'').toLowerCase()}">${esc(t)}</span>`).join('')}${f._inferred?'<span class="isoe-flag inferred">INFERRED</span>':''}</div>
        <h4 style="margin:6px 0 2px;font-size:16px">${esc(f.n)}</h4>
        <p class="small" style="margin:0">${esc(f.h)}${f.ib?' · '+esc(f.ib):''}</p>
      </div>
      <button class="isoe-score-pill ${scClass}" data-action="isoeScoreInfo" data-n="${esc(f.n)}" data-h="${esc(f.h)}" title="Tap for breakdown">
        <span class="isoe-score-num">${sc}</span>
        ${adj!==0?`<span class="isoe-score-delta">${adj>0?'+':''}${adj}</span>`:''}
      </button>
    </div>
    ${!inHidden&&!inTrash?`<div class="isoe-card-actions">
      <button class="isoe-act-btn ${fav?'on':''}" data-action="isoeFav" data-n="${esc(f.n)}" data-h="${esc(f.h)}">${fav?'★ Faved':'☆ Fav'}</button>
      <button class="isoe-act-btn" data-action="isoeHide" data-n="${esc(f.n)}" data-h="${esc(f.h)}">Hide</button>
      <button class="isoe-act-btn danger" data-action="isoeDelete" data-n="${esc(f.n)}" data-h="${esc(f.h)}">Trash</button>
    </div>`:`<div class="isoe-card-actions"><button class="isoe-act-btn" data-action="isoeRestore" data-n="${esc(f.n)}" data-h="${esc(f.h)}">↺ Restore</button></div>`}
    <details class="isoe-details">
      <summary>Procedure & breakdown</summary>
      <div class="isoe-procedure">
        <p><b>Iso E Super first</b> — ${f.sp||2} sprays on ${esc(f.w||'chest')}, let dry 30 sec.</p>
        <p><b>Then ${esc(f.n)}</b> — your normal application on top.</p>
        ${f.dna?`<p class="sub" style="margin-top:6px"><b>DNA:</b> ${esc(f.dna)}</p>`:''}
        ${f.b&&f.b!=='—'?(()=>{const bs=isoEParseBenefits(f.b);return bs.length?`<div class="isoe-benefits-block"><p class="sub" style="margin:8px 0 4px;font-size:10.5px;font-weight:800;letter-spacing:.07em;color:var(--accent2);text-transform:uppercase">What Iso E does for this bottle</p>${bs.map(b=>`<div class="isoe-benefit"><span class="isoe-benefit-pill ${b.cls}">${esc(b.label)}</span><span class="isoe-benefit-desc">${esc(b.desc)}</span></div>`).join('')}</div>`:''})():f.b==='—'?`<p class="sub" style="margin-top:6px;color:var(--danger)"><b>⚠ No benefit:</b> Iso E may clash with this composition. Test first.</p>`:''}
        ${f.imp?`<p class="sub" style="margin-top:6px;line-height:1.55">${esc(f.imp)}</p>`:''}
      </div>
      <div class="isoe-breakdown">
        <p style="margin:0 0 4px;font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--accent2);text-transform:uppercase">Score breakdown</p>
        <div class="isoe-bd-row"><span>Base</span><b>${breakdown.base}</b></div>
        <div class="isoe-bd-row"><span>Weather</span><b>${breakdown.adj>0?'+':''}${breakdown.adj}</b></div>
        <div class="isoe-bd-row total"><span>Final</span><b>${breakdown.final}</b></div>
        <p class="sub" style="margin:8px 0 0;font-size:11.5px"><i>${esc(breakdown.baseReason)}</i></p>
        <p class="sub" style="margin:4px 0 0;font-size:11.5px"><i>Weather: ${esc(breakdown.wxReason)}</i></p>
      </div>
    </details>
  </div>`
}
function isoEAboutModal(){
  return `<div class="modal show isoeAboutBackdrop" id="isoeAboutBackdrop"><div class="modalCard isoe-about">
    <div class="modalHandle"></div>
    <div class="between" style="margin-bottom:10px"><h2 style="margin:0;font-size:24px">About Iso E Super</h2><button class="btn sm secondary" data-action="isoeAboutClose">Close</button></div>
    <p class="sub">Iso E Super is a synthetic woody/cedrene molecule (Iso E Super by IFF, ~1973). It smells of dry transparent cedar with a peppery-fresh edge. Used as a base layer, it amplifies projection, smoothes rough edges, and extends drydown for compatible compositions.</p>

  </div></div>`
}

evice coordinates to Open-Meteo only when you request weather. Google Fonts may load from Google unless hosted locally.</p><p class="small" style="margin-top:10px">Build: ${VERSION}</p></div></section>`

function wireInputs(){
  document.querySelectorAll('[data-input="search"]').forEach(i=>i.oninput=e=>A.search({value:e.target.value}));
  document.querySelectorAll('[data-input="city"]').forEach(i=>i.oninput=e=>{state.city=e.target.value; if(state.weather){state.weather.fetchedAt=0;state.weather.cityKey='__stale__';state.weather.reason='Weather changed — tap Update';} save()});
  document.querySelectorAll('[data-input="isoeSearch"]').forEach(i=>i.oninput=e=>A.isoeSearch({value:e.target.value}));
  document.querySelectorAll('[data-file="fileImport"]').forEach(i=>i.onchange=e=>{A.fileImport({files:e.target.files}); e.target.value=''});
}
function renderJustList(){const list=document.getElementById('collectionList');if(!list)return render();let fs=filtered();let groups=fs.reduce((a,f)=>(a[f.house]=[...(a[f.house]||[]),f],a),{});list.innerHTML=Object.keys(groups).sort().map(h=>collectionHouseHTML(h,groups[h])).join('')||'<div class="empty"><b>No match in the vault.</b><br><button class="btn sm secondary" data-action="resetCollectionFilters">Clear all filters</button></div>';const count=document.getElementById('collectionCount');if(count)count.textContent=`${fs.length} of ${state.collection.length} bottles${state.search||state.filterDNA!=='All'||state.filterSeason!=='All'||state.filterHouse!=='All'||state.filterOccasion!=='All'?' (filtered)':''}`}
function download(name,text,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:type||'application/json'}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}

// EVENT BINDING
document.addEventListener('click',e=>{
  // Selects are handled by 'change' event only — clicking opens the picker, doesn't pick a value
  if(e.target.tagName==='SELECT'||e.target.tagName==='OPTION')return;
  const el=e.target.closest('[data-action]');if(!el)return;
  if(el.tagName==='SELECT')return;
  e.stopPropagation();
  const fn=A[el.dataset.action];if(!fn)return;
  haptic();
  fn({...el.dataset,value:el.value,files:el.files,stopPropagation:()=>e.stopPropagation()})
});
document.addEventListener('keydown',e=>{const el=e.target.closest('[data-action]');if(!el)return;if((e.key==='Enter'||e.key===' ')&&el.getAttribute('role')==='button'){e.preventDefault();el.click()}});
document.addEventListener('change',e=>{const el=e.target.closest('[data-action]');if(!el)return;const fn=A[el.dataset.action];if(fn){haptic();fn({...el.dataset,value:el.value,files:el.files})}});
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')A.closeModal()});
document.addEventListener('click',e=>{if(e.target.id==='isoeAboutBackdrop')A.isoeAboutClose()});
document.addEventListener('click',e=>{if(e.target.id==='isoeScoreModalBackdrop')A.isoeScoreInfoClose()});
try{const mq=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');if(mq&&mq.addEventListener)mq.addEventListener('change',()=>{if(state.theme==='auto'){applyTheme();render()}})}catch(e){}

window.addEventListener('error',e=>{
  const app=document.getElementById('app');
  if(app&&!app.dataset.errCaught){
    app.dataset.errCaught='1';
    app.innerHTML=`<div class="card" style="max-width:720px;margin:28px auto;border-color:rgba(181,59,59,.45);background:linear-gradient(160deg,rgba(181,59,59,.16),var(--panel));">
      <p class="eyebrow" style="color:var(--danger)">Recovery mode</p>
      <h2 style="margin:0 0 8px">The Vault encountered an issue.</h2>
      <p class="sub">Your local collection data is still on this device. Try reloading first. If the problem continues, reset local data and reload the embedded collection.</p>
      <details style="margin-top:12px"><summary>Technical details</summary><pre style="white-space:pre-wrap;font-size:12px;color:var(--muted);overflow:auto">${esc(e.message||'Unknown error')}
${esc((e.filename||'').split('/').pop())}:${e.lineno||0}:${e.colno||0}</pre></details>
      <div class="row" style="margin-top:14px"><button class="btn secondary" id="vaultReloadBtn">Reload</button><button class="btn danger" id="vaultResetBtn">Reset local data</button></div>
    </div>`;
    const reload=document.getElementById('vaultReloadBtn');
    const reset=document.getElementById('vaultResetBtn');
    if(reload)reload.onclick=()=>location.reload();
    if(reset)reset.onclick=()=>{localStorage.removeItem(STORE);location.reload()};
  }
});

try{
  // Apply URL hash before first render so direct links and browser restore work.
  if(location.hash){applyCurrentRoute({replace:false,scroll:false})}

}
