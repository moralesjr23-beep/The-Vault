<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#10101d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="The Vault" />
  <title>The Vault — Maison AJ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');
    :root{
      --bg:#fbf7ee; --panel:#fffaf0; --panel2:#f5ead7; --text:#17140f; --muted:#6b604f; --line:rgba(80,58,20,.18);
      --accent:#b78934; --accent2:#7a5a22; --danger:#b53b3b; --good:#2f7c54; --warn:#c98a2b;
      --shadow:0 18px 45px rgba(48,34,12,.14); --shadowSm:0 6px 16px rgba(48,34,12,.08);
      --chip:#efe3ca; --nav:#fffaf0; --btn:#1c1a17; --btnText:#fff8e8;
      --display:"Cormorant Garamond",Georgia,serif; --body:"Inter",-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
    }
    [data-theme="dark"]{
      --bg:#0e0e1c; --panel:#17172a; --panel2:#20203a; --text:#f7f0df; --muted:#aa9f8b; --line:rgba(232,184,74,.18);
      --accent:#e8b84a; --accent2:#ffd66f; --danger:#ff6b6b; --good:#72d49d; --warn:#ffc875;
      --shadow:0 22px 55px rgba(0,0,0,.42); --shadowSm:0 6px 16px rgba(0,0,0,.3);
      --chip:#262646; --nav:#151527; --btn:#e8b84a; --btnText:#17120a;
    }
    *{box-sizing:border-box}
    html{height:100%;-webkit-text-size-adjust:100%}
    body{margin:0;min-height:100%;background:radial-gradient(ellipse at top,var(--panel2),var(--bg) 50%) fixed;color:var(--text);font-family:var(--body);font-size:15px;line-height:1.45;padding:env(safe-area-inset-top) 0 calc(78px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased}
    button,input,select,textarea{font:inherit;font-family:var(--body)}
    button{min-height:44px;cursor:pointer}
    .app{max-width:980px;margin:0 auto;padding:14px 14px 0}
    header{position:sticky;top:0;z-index:20;padding:10px 0 12px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:linear-gradient(to bottom,var(--bg) 30%,rgba(0,0,0,0))}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand h1{font-family:var(--display);font-size:42px;line-height:.9;margin:0;letter-spacing:.005em;font-weight:600;font-style:italic;font-feature-settings:"liga","dlig"}
    .brand h1 .pronounce{font-style:normal;font-size:11px;font-weight:500;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;display:block;margin-top:2px;font-family:var(--body);opacity:.7}
    .brand p{margin:6px 0 0;color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
    .themeToggle{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);padding:4px;border-radius:999px;box-shadow:var(--shadowSm)}
    .themeToggle button{border:0;border-radius:999px;background:transparent;color:var(--muted);padding:0 11px;font-size:12px;min-height:32px;font-weight:600}
    .themeToggle button.active{background:var(--btn);color:var(--btnText)}
    .upgradeBanner{margin-top:10px;padding:10px 14px;background:linear-gradient(90deg,rgba(232,184,74,.18),rgba(232,184,74,.08));border:1px solid var(--accent);border-radius:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:12.5px;font-weight:600}
    .upgradeBanner span{flex:1;line-height:1.35}

    main{padding-bottom:12px}
    .view{display:none}
    .view.active{display:block;animation:fadeIn .25s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .card{background:linear-gradient(180deg,var(--panel),rgba(255,255,255,0));border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:18px;margin:14px 0}
    .card h2,.card h3{font-family:var(--display);margin:0 0 10px;letter-spacing:.01em;font-weight:600}
    .card h2{font-size:30px}
    .card h3{font-size:22px}
    .sub{color:var(--muted);font-size:13px;line-height:1.5}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    @media(min-width:720px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}.app{padding:16px 22px 0}}

    .input,select,textarea{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:14px;padding:12px 14px;min-height:44px;outline:none;transition:border-color .15s,box-shadow .15s}
    .input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(183,137,52,.18)}
    textarea{min-height:88px;resize:vertical}
    .btn{border:0;border-radius:14px;background:var(--btn);color:var(--btnText);padding:0 16px;font-weight:700;box-shadow:0 6px 16px rgba(0,0,0,.14);transition:transform .1s,filter .15s}
    .btn:active{transform:scale(.97)}
    .btn:hover{filter:brightness(1.06)}
    .btn.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line);box-shadow:none}
    .btn.danger{background:var(--danger);color:#fff}
    .btn.full{width:100%}
    .btn.sm{padding:0 11px;min-height:34px;font-size:13px;border-radius:11px}

    .chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none;-ms-overflow-style:none}
    .chips::-webkit-scrollbar{display:none}
    .chip{border:1px solid var(--line);background:var(--chip);color:var(--text);border-radius:999px;padding:8px 12px;white-space:nowrap;font-size:12.5px;min-height:36px;display:inline-flex;align-items:center;gap:6px;font-weight:500;transition:transform .1s}
    .chip:active{transform:scale(.96)}
    .chip.active{background:var(--btn);color:var(--btnText);border-color:transparent;font-weight:700}
    .dnaChip{border-radius:999px;padding:6px 10px;color:#0c0c14;font-weight:700;font-size:11.5px;border:1px solid rgba(255,255,255,.35);letter-spacing:.01em;background:#a08254}
    .wearDnaBlock{margin:12px 0 0;padding:11px 12px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(135deg,rgba(232,184,74,.08),rgba(255,255,255,.02))}
    .wearDnaLabel{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin:0 0 7px}
    .wearDnaRow{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .wearDnaBlock .dnaChip{font-size:11px;padding:6px 9px;box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:rgba(255,255,255,.28)}
    .wearAltDna{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0 4px}
    .wearAltDna .dnaChip{font-size:10.5px;padding:5px 8px}

    .bottleCard{border:1px solid var(--line);background:linear-gradient(160deg,var(--panel),var(--panel2));border-radius:22px;padding:14px;min-height:160px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:transform .12s,box-shadow .15s;position:relative;overflow:hidden}
    .bottleCard:active{transform:scale(.985)}
    .bottleCard:hover{box-shadow:var(--shadow)}
    .bottleCard h3{font-size:19px;margin:0 0 4px;line-height:1.15}
    .meta{color:var(--muted);font-size:11.5px;line-height:1.4}
    .flag{font-size:9.5px;font-weight:800;letter-spacing:.08em;color:var(--accent2);background:rgba(183,137,52,.14);padding:3px 7px;border-radius:6px;text-transform:uppercase}
    .flag.dust{color:var(--warn);background:rgba(201,138,43,.16)}
    .sectionTitle{font-family:var(--display);font-size:24px;margin:22px 4px 10px;font-weight:600;display:flex;justify-content:space-between;align-items:baseline}
    .sectionTitle .count{font-family:var(--body);font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.04em}
    .list{display:grid;gap:10px}
    .lineItem{padding:13px 14px;border:1px solid var(--line);border-radius:16px;background:var(--panel)}
    .lineItem b{font-weight:700}

    /* === LAB HERO — CINEMATIC ANIMATION === */
    .labHero{position:relative;min-height:280px;border-radius:24px;background:radial-gradient(ellipse at center,var(--panel2),var(--panel));border:1px solid var(--line);overflow:hidden;padding:16px 12px 12px;isolation:isolate}
    /* Vignette layer */
    .labHero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.35) 100%);opacity:0;transition:opacity .4s ease;pointer-events:none;z-index:1}
    .labHero.animating::before{opacity:1}
    /* Spotlight beam from center */
    .labHero::after{content:'';position:absolute;left:50%;top:50%;width:280px;height:280px;background:radial-gradient(circle,rgba(232,184,74,.18) 0%,transparent 60%);transform:translate(-50%,-50%) scale(.3);opacity:0;transition:transform .8s cubic-bezier(.4,0,.2,1),opacity .5s ease;pointer-events:none;z-index:0}
    .labHero.merge::after{opacity:1;transform:translate(-50%,-50%) scale(1.2)}
    .labHero.clash::after{background:radial-gradient(circle,rgba(220,60,60,.25) 0%,transparent 60%);opacity:1}

    .bottleStage{position:relative;height:240px;z-index:2}
    .svgBottle{position:absolute;top:24px;width:108px;height:174px;transform-origin:bottom center;transition:transform .9s cubic-bezier(.34,1.56,.64,1),opacity .4s ease,filter .4s ease;filter:drop-shadow(0 6px 12px rgba(0,0,0,.25))}
    .bottleA{left:6%;transform:rotate(-2deg)}
    .bottleB{right:6%;transform:rotate(2deg)}
    .resultBottle{left:50%;transform:translateX(-50%) scale(.5) translateY(20px);opacity:0;filter:drop-shadow(0 0 24px rgba(232,184,74,.5)) drop-shadow(0 8px 16px rgba(0,0,0,.3))}

    /* Step 1: tilt and pour toward center */
    .labHero.animating .bottleA{transform:translateX(50px) rotate(18deg) scale(1.04)}
    .labHero.animating .bottleB{transform:translateX(-50px) rotate(-18deg) scale(1.04)}

    /* Droplet trails */
    .droplet{position:absolute;width:6px;height:10px;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;top:88px;opacity:0;z-index:3;pointer-events:none;filter:blur(.3px)}
    .dropletA{left:38%;background:radial-gradient(circle at 30% 30%,#fff,var(--accent) 70%)}
    .dropletB{right:38%;background:radial-gradient(circle at 30% 30%,#fff,var(--accent2) 70%)}
    .labHero.animating .dropletA{animation:dropFallA 700ms cubic-bezier(.55,0,.6,1) 280ms forwards}
    .labHero.animating .dropletB{animation:dropFallB 700ms cubic-bezier(.55,0,.6,1) 280ms forwards}
    @keyframes dropFallA{0%{opacity:0;transform:translate(0,0) scale(.5)}15%{opacity:1;transform:translate(8px,12px) scale(1)}70%{opacity:1;transform:translate(56px,40px) scale(.9)}100%{opacity:0;transform:translate(76px,52px) scale(.3)}}
    @keyframes dropFallB{0%{opacity:0;transform:translate(0,0) scale(.5)}15%{opacity:1;transform:translate(-8px,12px) scale(1)}70%{opacity:1;transform:translate(-56px,40px) scale(.9)}100%{opacity:0;transform:translate(-76px,52px) scale(.3)}}

    /* Orb */
    .orb{position:absolute;left:50%;top:78px;width:96px;height:96px;transform:translateX(-50%) scale(.2);opacity:0;transition:transform .6s cubic-bezier(.34,1.56,.64,1),opacity .4s ease;filter:drop-shadow(0 0 22px rgba(232,184,74,.55));z-index:4;pointer-events:none}
    .labHero.merge .orb{opacity:1;transform:translateX(-50%) scale(1)}
    .labHero.merge .orb circle{animation:orbPulse 1.4s ease-in-out infinite}
    @keyframes orbPulse{0%,100%{transform-origin:center;transform:scale(1)}50%{transform:scale(1.06)}}

    /* Particle burst */
    .particles{position:absolute;left:50%;top:50%;width:2px;height:2px;z-index:3;pointer-events:none}
    .particle{position:absolute;left:0;top:0;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);opacity:0}
    .labHero.merge .particle{animation:particleBurst 800ms cubic-bezier(.2,.7,.4,1) forwards}
    .labHero.merge .particle:nth-child(1){animation-delay:0ms;--tx:80px;--ty:0px}
    .labHero.merge .particle:nth-child(2){animation-delay:30ms;--tx:64px;--ty:64px}
    .labHero.merge .particle:nth-child(3){animation-delay:60ms;--tx:0px;--ty:70px}
    .labHero.merge .particle:nth-child(4){animation-delay:90ms;--tx:-60px;--ty:60px}
    .labHero.merge .particle:nth-child(5){animation-delay:120ms;--tx:-78px;--ty:0px}
    .labHero.merge .particle:nth-child(6){animation-delay:50ms;--tx:-62px;--ty:-62px}
    .labHero.merge .particle:nth-child(7){animation-delay:80ms;--tx:0px;--ty:-75px}
    .labHero.merge .particle:nth-child(8){animation-delay:110ms;--tx:58px;--ty:-58px}
    @keyframes particleBurst{
      0%{opacity:0;transform:translate(0,0) scale(.3)}
      20%{opacity:1;transform:translate(calc(var(--tx) * .3),calc(var(--ty) * .3)) scale(1)}
      100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.4)}
    }

    /* Result reveal */
    .labHero.result .bottleA{transform:translateX(-90px) rotate(-2deg) scale(.85);opacity:.18;filter:saturate(.4) blur(1px)}
    .labHero.result .bottleB{transform:translateX(90px) rotate(2deg) scale(.85);opacity:.18;filter:saturate(.4) blur(1px)}
    .labHero.result .resultBottle{opacity:1;transform:translateX(-50%) scale(1.05) translateY(0);animation:resultBob 3s ease-in-out 1s infinite}
    .labHero.result .orb{opacity:0;transform:translateX(-50%) scale(2.2);filter:drop-shadow(0 0 40px rgba(232,184,74,.8))}
    @keyframes resultBob{0%,100%{transform:translateX(-50%) scale(1.05) translateY(0)}50%{transform:translateX(-50%) scale(1.05) translateY(-4px)}}

    /* Clash mode — bottles still merge into one, but the combo bottle gets a red glow and shaky settle */
    .labHero.clash .bottleA{transform:translateX(-110px) rotate(-12deg) scale(.85);filter:saturate(.4) blur(1px) drop-shadow(0 0 12px rgba(220,60,60,.4));opacity:.18}
    .labHero.clash .bottleB{transform:translateX(110px) rotate(12deg) scale(.85);filter:saturate(.4) blur(1px) drop-shadow(0 0 12px rgba(220,60,60,.4));opacity:.18}
    .labHero.clash .orb{opacity:1;transform:translateX(-50%) scale(1.1);animation:shake .5s ease;filter:drop-shadow(0 0 28px rgba(220,60,60,.85)) saturate(1.5)}
    .labHero.clash.result .resultBottle{opacity:1;filter:drop-shadow(0 0 24px rgba(220,60,60,.55)) drop-shadow(0 8px 16px rgba(0,0,0,.3)) saturate(.85);animation:clashSettle .8s ease, resultBob 3s ease-in-out 1s infinite}
    @keyframes clashSettle{0%{transform:translateX(-50%) scale(1.05) translateY(0)}20%{transform:translateX(calc(-50% - 8px)) scale(1.05) rotate(-2deg)}40%{transform:translateX(calc(-50% + 8px)) scale(1.05) rotate(2deg)}60%{transform:translateX(calc(-50% - 4px)) scale(1.05) rotate(-1deg)}80%{transform:translateX(calc(-50% + 4px)) scale(1.05) rotate(1deg)}100%{transform:translateX(-50%) scale(1.05) translateY(0)}}
    .labHero.clash::before{background:radial-gradient(ellipse at center,transparent 20%,rgba(60,0,0,.5) 100%)}
    @keyframes shake{0%,100%{transform:translateX(-50%) scale(1.1)}15%{transform:translateX(calc(-50% - 14px)) rotate(-3deg) scale(1.1)}30%{transform:translateX(calc(-50% + 14px)) rotate(3deg) scale(1.1)}45%{transform:translateX(calc(-50% - 10px)) rotate(-2deg) scale(1.1)}60%{transform:translateX(calc(-50% + 10px)) rotate(2deg) scale(1.1)}75%{transform:translateX(calc(-50% - 5px)) scale(1.1)}}

    /* Calculate button pulse during anim */
    .labHero.animating ~ .row .btn[data-action="calc"]{animation:calcPulse 1s ease-in-out infinite}
    @keyframes calcPulse{0%,100%{box-shadow:0 6px 16px rgba(0,0,0,.14)}50%{box-shadow:0 6px 24px rgba(232,184,74,.6)}}

    .scoreNum{font-family:var(--display);font-size:60px;line-height:1;text-align:center;font-weight:600;animation:scoreIn .6s cubic-bezier(.34,1.56,.64,1)}
    .scoreNum.bad{color:var(--danger)}
    .scoreNum.great{color:var(--good);text-shadow:0 0 24px rgba(47,124,84,.4)}
    @keyframes scoreIn{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.15) rotate(8deg);opacity:1}100%{transform:scale(1) rotate(0)}}
    .verdict{animation:verdictIn .5s cubic-bezier(.34,1.56,.64,1) .15s both}
    @keyframes verdictIn{0%{transform:translateX(20px) scale(.7);opacity:0}100%{transform:translateX(0) scale(1);opacity:1}}
    .rationale.show{animation:rationaleIn .5s ease .3s both;opacity:1}
    @keyframes rationaleIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .tagRow .dnaChip{animation:chipIn .4s cubic-bezier(.34,1.56,.64,1) both}
    .tagRow .dnaChip:nth-child(1){animation-delay:.45s}
    .tagRow .dnaChip:nth-child(2){animation-delay:.5s}
    .tagRow .dnaChip:nth-child(3){animation-delay:.55s}
    .tagRow .dnaChip:nth-child(4){animation-delay:.6s}
    .tagRow .dnaChip:nth-child(5){animation-delay:.65s}
    .tagRow .dnaChip:nth-child(6){animation-delay:.7s}
    .tagRow .dnaChip:nth-child(7){animation-delay:.75s}
    .tagRow .dnaChip:nth-child(8){animation-delay:.8s}
    @keyframes chipIn{0%{transform:scale(0) rotate(-90deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}

    /* === ISO E SUPER (scoped under .isoe-root) === */
    .isoe-root .between{align-items:center}
    .isoe-hero h2{font-family:var(--display);font-size:28px;font-weight:600}
    .isoe-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
    .isoe-stat{padding:10px;border:1px solid var(--line);border-radius:14px;background:var(--panel);text-align:center}
    .isoe-stat-v{font-family:var(--display);font-size:22px;font-weight:600;line-height:1;color:var(--accent)}
    .isoe-stat-l{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:5px;font-weight:700}
    .isoe-weather{display:flex;align-items:flex-start;gap:14px}
    .isoe-wx-icon{font-size:28px;flex-shrink:0}
    .isoe-info-btn{background:transparent;border:0;color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;padding:0 6px;min-height:0}
    .isoe-wx-info{border-left:3px solid var(--accent)}
    .isoe-info-list{margin:6px 0;padding-left:18px;font-size:13px;color:var(--text);line-height:1.7}
    .isoe-info-list li{margin:4px 0}
    .isoe-info-list b{color:var(--accent2);font-weight:700}
    .isoe-combos summary{font-size:14px;padding:6px 0}
    .isoe-combos summary b{font-size:14px}
    .isoe-combo-list{display:grid;gap:10px;margin-top:10px}
    .isoe-combo{padding:12px;background:var(--panel2);border-radius:14px;border:1px solid var(--line)}
    .isoe-frag-pill{display:inline-block;padding:3px 8px;background:var(--panel);border:1px solid var(--line);border-radius:8px;font-size:11.5px;font-weight:600;color:var(--accent2);margin:2px}
    .isoe-house{margin-bottom:14px}
    .isoe-house-h{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:14px;color:var(--text);font-size:14px;cursor:pointer;text-align:left}
    .isoe-house-h:hover{background:var(--chip)}
    .isoe-collapse-tri{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;background:var(--panel);border-radius:6px;font-weight:800;font-size:14px;color:var(--accent)}
    .isoe-house-h .small{color:var(--muted);font-size:11px;font-weight:600}
    .isoe-house-avg{margin-left:auto;font-size:10px;font-weight:800;background:var(--panel);border:1px solid var(--line);padding:3px 8px;border-radius:6px;color:var(--accent2);letter-spacing:.04em}
    .isoe-house-avg.high{color:var(--good);border-color:rgba(47,124,84,.4);background:rgba(47,124,84,.08)}
    .isoe-house-avg.low{color:var(--danger);border-color:rgba(181,59,59,.4);background:rgba(181,59,59,.08)}
    .isoe-cards{display:grid;gap:10px;margin-top:10px}
    .isoe-card{background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;padding:12px}
    .isoe-card.inferred{border-style:dashed;opacity:.94}
    .isoe-card-head{display:flex;gap:12px;align-items:flex-start}
    .isoe-card h4{font-family:var(--display);letter-spacing:.005em;font-weight:600}
    .isoe-flag{display:inline-block;font-size:9px;font-weight:800;padding:3px 7px;border-radius:5px;letter-spacing:.06em;background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
    .isoe-flag.distinct{color:var(--good);border-color:rgba(47,124,84,.4);background:rgba(47,124,84,.08)}
    .isoe-flag.anchor{color:var(--accent2);border-color:var(--accent);background:rgba(232,184,74,.12)}
    .isoe-flag.cautionn,.isoe-flag.muted,.isoe-flag.overlap,.isoe-flag.neardup,.isoe-flag.exactdup{color:var(--warn);border-color:rgba(201,138,43,.4);background:rgba(201,138,43,.1)}
    .isoe-flag.inferred{color:var(--muted);font-style:italic}
    .isoe-score-pill{flex-shrink:0;background:var(--accent);color:#0c0c14;padding:6px 12px;border-radius:12px;display:flex;flex-direction:column;align-items:center;font-weight:800;min-width:54px;border:0;cursor:pointer;transition:transform .12s,box-shadow .15s}
    .isoe-score-pill:active{transform:scale(.94)}
    .isoe-score-pill:hover{box-shadow:0 4px 12px rgba(0,0,0,.18)}
    .isoe-score-pill.high{background:var(--good);color:#fff}
    .isoe-score-pill.low{background:var(--danger);color:#fff}

    /* Legend banner */
    .isoe-legend{border:1px solid var(--accent);background:linear-gradient(160deg,rgba(232,184,74,.08),var(--panel))}
    .isoe-legend .isoe-info-btn{font-size:18px;width:28px;height:28px;border-radius:8px;background:rgba(0,0,0,.05);color:var(--muted)}
    .isoe-legend-grid{display:grid;gap:6px}
    .isoe-legend-row{display:flex;align-items:center;gap:10px;font-size:12px;line-height:1.4}
    .isoe-legend-pill{display:inline-flex;align-items:center;justify-content:center;min-width:48px;padding:3px 8px;border-radius:8px;font-weight:800;font-size:11px;color:#0c0c14}
    .isoe-legend-pill.high{background:var(--good);color:#fff}
    .isoe-legend-pill.mid{background:var(--accent);color:#0c0c14}
    .isoe-legend-pill.mid2{background:var(--accent);color:#0c0c14;opacity:.7}
    .isoe-legend-pill.low{background:var(--danger);color:#fff}

    /* Benefit pills inside procedure — refined monochrome variants */
    .isoe-benefits-block{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
    .isoe-benefit{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;line-height:1.5}
    .isoe-benefit-pill{flex-shrink:0;font-size:10px;font-weight:700;letter-spacing:.06em;padding:4px 10px;border-radius:6px;background:transparent;border:1px solid var(--accent);color:var(--accent);min-width:118px;text-align:center;white-space:nowrap;text-transform:uppercase}
    .isoe-benefit-pill.amp{border-color:var(--accent);color:var(--accent);background:rgba(232,184,74,.08)}
    .isoe-benefit-pill.long{border-color:var(--good);color:var(--good);background:rgba(114,212,157,.08)}
    .isoe-benefit-pill.proj{border-color:var(--warn);color:var(--warn);background:rgba(255,200,117,.08)}
    .isoe-benefit-pill.depth{border-color:var(--accent2);color:var(--accent2);background:rgba(255,214,111,.06)}
    .isoe-benefit-pill.bind{border-color:var(--accent);color:var(--accent2);background:rgba(232,184,74,.12)}
    .isoe-benefit-pill.lift{border-color:var(--accent2);color:var(--accent2);background:rgba(255,214,111,.06)}
    .isoe-benefit-desc{font-size:12px;color:var(--text);opacity:.78;line-height:1.55}
    .isoe-score-num{font-family:var(--display);font-size:24px;line-height:1;font-weight:600}
    .isoe-score-delta{font-size:10px;opacity:.85;margin-top:2px;letter-spacing:.02em}
    .isoe-card-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
    .isoe-act-btn{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:7px 10px;border-radius:10px;font-size:11.5px;font-weight:700;cursor:pointer;min-height:34px;transition:background .15s}
    .isoe-act-btn:hover{background:var(--chip)}
    .isoe-act-btn.on{background:var(--accent);color:#0c0c14;border-color:transparent}
    .isoe-act-btn.danger:hover{background:rgba(181,59,59,.15);color:var(--danger);border-color:rgba(181,59,59,.4)}
    .isoe-details{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;border-radius:0;background:transparent;padding-left:0;padding-right:0}
    .isoe-details summary{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;min-height:28px}
    .isoe-procedure{padding:10px 0;font-size:13px;line-height:1.55}
    .isoe-procedure p{margin:4px 0}
    .isoe-breakdown{padding:10px;background:var(--panel2);border-radius:10px;margin-top:6px}
    .isoe-bd-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
    .isoe-bd-row.total{border-top:1px solid var(--line);margin-top:4px;padding-top:6px;font-weight:700}
    .isoe-bd-row.total b{color:var(--accent);font-family:var(--display);font-size:18px;font-weight:600}
    .isoe-about h3{font-family:var(--display);font-size:18px;font-weight:600;margin:0 0 6px}

    /* Problem list — surfaces failure reasons for low scores */
    .problemList{margin-top:14px;border-radius:14px;overflow:hidden;border:1px solid rgba(220,60,60,.25);background:linear-gradient(180deg,rgba(220,60,60,.06),rgba(220,60,60,.02));animation:problemIn .5s ease .35s both}
    .problemHeader{padding:10px 14px;background:rgba(220,60,60,.12);font-size:11.5px;font-weight:800;color:var(--danger);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid rgba(220,60,60,.2)}
    .problemItem{display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid rgba(220,60,60,.12)}
    .problemItem:last-child{border-bottom:0}
    .problemItem b{font-size:14px;font-weight:700}
    .problemIcon{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:10px;background:rgba(220,60,60,.14);color:var(--danger);font-size:16px;font-weight:800;flex-shrink:0}
    @keyframes problemIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* Spray control */
    .sprayControl{margin-bottom:14px;padding:14px;background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:18px}
    .sprayHeader{font-size:11.5px;font-weight:800;color:var(--accent2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
    .sprayRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
    .sprayRow:last-of-type{border-bottom:0}
    .sprayLabel{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
    .sprayLabel b{font-size:13.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sprayStepper{display:flex;align-items:center;gap:0;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;flex-shrink:0}
    .stepBtn{background:transparent;border:0;color:var(--text);width:36px;height:36px;font-size:18px;font-weight:800;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;min-height:36px;transition:background .12s}
    .stepBtn:active{background:var(--btn);color:var(--btnText)}
    .stepBtn:hover{background:rgba(232,184,74,.1)}
    .sprayCount{font-family:var(--display);font-size:22px;font-weight:600;line-height:1;min-width:32px;text-align:center;padding:0 4px;color:var(--accent)}
    .sprayTotal{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:13px}
    .sprayTotal b{font-family:var(--display);font-size:18px;color:var(--accent);font-weight:600}

    /* Win list — shows when ratio adjustments are *helping* */
    .winList{margin-top:14px;border-radius:14px;overflow:hidden;border:1px solid rgba(47,124,84,.3);background:linear-gradient(180deg,rgba(47,124,84,.06),rgba(47,124,84,.02));animation:problemIn .4s ease both}
    .winHeader{padding:9px 14px;background:rgba(47,124,84,.12);font-size:11.5px;font-weight:800;color:var(--good);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid rgba(47,124,84,.2)}
    .winItem{display:flex;gap:12px;padding:10px 14px;border-bottom:1px solid rgba(47,124,84,.12)}
    .winItem:last-child{border-bottom:0}
    .winItem b{font-size:13.5px;font-weight:700}
    .winIcon{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:9px;background:rgba(47,124,84,.16);color:var(--good);font-size:16px;font-weight:800;flex-shrink:0}
    .winDelta{display:inline-block;font-size:10.5px;font-weight:800;color:var(--good);background:rgba(47,124,84,.18);padding:1px 6px;border-radius:5px;margin-left:4px;letter-spacing:.02em}

    /* Score pulse on stepper change */
    .scorePulse{animation:scorePulse .4s ease}
    @keyframes scorePulse{0%{transform:scale(1)}50%{transform:scale(1.15);text-shadow:0 0 24px rgba(232,184,74,.6)}100%{transform:scale(1)}}
    .verdict{display:inline-flex;align-items:center;min-height:36px;border-radius:999px;padding:6px 14px;font-weight:800;background:var(--good);color:#fff;font-size:13px;letter-spacing:.01em}
    .verdict.bad{background:var(--danger)}
    .verdict.mid{background:var(--warn);color:#1c1208}
    .rationale{opacity:0;transition:opacity .35s ease;line-height:1.55}
    .rationale.show{opacity:1}
    .tagRow{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:12px}
    .tagRow .shared{font-size:13px;transform:scale(1.06);box-shadow:0 0 16px rgba(232,184,74,.5)}
    details{border:1px solid var(--line);border-radius:14px;padding:10px 14px;background:var(--panel)}
    summary{min-height:34px;display:flex;align-items:center;font-weight:700;cursor:pointer;font-size:14px}
    summary::marker{color:var(--accent)}

    .comboSaved{display:grid;gap:10px}
    .weatherBox{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}
    .weatherStat{font-family:var(--display);font-size:46px;font-weight:600;line-height:1}
    .pickReason{font-size:11.5px;color:var(--accent2);font-weight:600;letter-spacing:.02em;margin-top:6px}

    /* DNA Wheel */
    .wheelWrap{display:grid;gap:14px;place-items:center}
    .wheel{width:min(92vw,420px);height:min(92vw,420px)}
    .wedge{cursor:pointer;transition:opacity .2s,transform .25s;transform-origin:center}
    .wedge:hover{opacity:.82}
    .wedge.selected{filter:drop-shadow(0 0 8px rgba(232,184,74,.6))}
    .legendGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;width:100%}
    .gap{border-color:rgba(181,59,59,.5);background:rgba(181,59,59,.08);position:relative}
    .gap::after{content:"GAP";position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:800;color:var(--danger);letter-spacing:.05em}

    /* Bottom nav */
    .bottomNav{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(20,20,32,.78);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-top:1px solid rgba(232,184,74,.18)}
    .navInner{max-width:980px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
    .navBtn{min-height:54px;border:0;border-radius:14px;background:transparent;color:#e9e0ce;font-size:9.5px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;letter-spacing:.02em;transition:background .15s;padding:0 2px}
    .navBtn .ic{font-size:17px;line-height:1}
    .navBtn.active{background:rgba(232,184,74,.18);color:#fff}

    .empty{padding:22px;border:1px dashed var(--line);border-radius:18px;color:var(--muted);text-align:center;font-size:14px;line-height:1.55}
    .small{font-size:11.5px;color:var(--muted)}
    .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--btn);color:var(--btnText);border-radius:999px;padding:11px 18px;z-index:60;transition:.25s;box-shadow:var(--shadow);font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:10px;max-width:90vw}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast button{background:transparent;color:inherit;border:1px solid currentColor;border-radius:999px;padding:3px 10px;min-height:0;font-size:11px;font-weight:700;opacity:.9}

    select option{background:var(--panel);color:var(--text)}
    select optgroup{background:var(--panel2);color:var(--accent2);font-weight:700;font-style:normal;letter-spacing:.04em}
    .row select{flex:1 1 240px;min-width:0}

    .pickerWrap{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),rgba(255,255,255,0));border-radius:18px;padding:12px;margin-bottom:10px}
    .pickerLabel{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;min-height:30px}
    .pickerLabel b{font-size:14px;font-weight:700}
    .pickerLabel .small{font-size:11.5px}
    .pickerSide{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:var(--btn);color:var(--btnText);font-weight:800;font-size:13px;flex-shrink:0}
    .pickerLabel button.btn{margin-left:auto}
    .pickerWrap .chips{margin-bottom:0}
    .pickerWrap .chips:last-child{padding-bottom:2px}
    .houseSelect{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:14px;padding:12px 14px;min-height:46px;outline:none;font-size:14px;font-weight:600;margin-bottom:10px;appearance:none;-webkit-appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 18px) center,calc(100% - 13px) center;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:38px}
    .houseSelect:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(183,137,52,.18)}
    .bottleScroll{max-height:240px;overflow-y:auto;border-top:1px solid var(--line);padding-top:10px;margin-top:6px;-webkit-overflow-scrolling:touch}
    .bottleScroll::-webkit-scrollbar{width:4px}
    .bottleScroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
    .bottleScroll .chips{flex-wrap:wrap;overflow:visible;padding:0}
    .bottleScroll .chip{font-size:12px;flex:0 0 auto}


    .sourceLine{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.35}
    .sourceLine b{color:var(--accent2)}
    .weatherSearch{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;margin-top:14px}
    .pickerWrap:has(select:focus){box-shadow:0 0 0 3px rgba(232,184,74,.10);border-color:var(--accent)}
    .bottleCard,.lineItem,.isoe-card{content-visibility:auto;contain-intrinsic-size:180px}
    @media(max-width:430px){.weatherSearch{grid-template-columns:1fr}.brand h1{font-size:34px}.brandMark{width:46px;height:46px;font-size:18px}.navBtn{font-size:9px}.card{border-radius:20px;padding:15px}}

    /* Add bottle modal */
    .modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);display:none;align-items:flex-end;padding:0;animation:fadeIn .2s ease}
    .modal.show{display:flex}
    .modalCard{background:var(--bg);border-radius:28px 28px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:18px 16px calc(20px + env(safe-area-inset-bottom));border-top:1px solid var(--line);animation:slideUp .3s cubic-bezier(.2,.8,.2,1)}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modalHandle{width:42px;height:5px;background:var(--line);border-radius:999px;margin:0 auto 14px}
    .formGrid{display:grid;gap:12px}
    .label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 5px;display:block}
    .dnaPicker{display:flex;flex-wrap:wrap;gap:6px}
    .dnaPickItem{border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-size:11.5px;font-weight:600;cursor:pointer;background:var(--panel);transition:transform .1s}
    .dnaPickItem:active{transform:scale(.96)}
    .dnaPickItem.on{color:#0c0c14;border-color:transparent;font-weight:800}
    .ratingPick{display:flex;gap:4px}
    .ratingPick button{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--muted);font-weight:700;min-height:40px;font-size:14px}
    .ratingPick button.on{background:var(--btn);color:var(--btnText);border-color:transparent}

    /* Stat tiles */
    .statTiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    @media(min-width:560px){.statTiles{grid-template-columns:repeat(4,1fr)}}
    .stat{padding:14px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(160deg,var(--panel),var(--panel2))}
    .stat .v{font-family:var(--display);font-size:30px;line-height:1;font-weight:600}
    .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:6px;font-weight:600}

    .barRow{display:grid;grid-template-columns:90px 1fr 30px;gap:10px;align-items:center;font-size:12px;margin:6px 0}
    .barTrack{height:7px;background:var(--panel2);border-radius:999px;overflow:hidden}
    .barFill{height:100%;border-radius:999px;transition:width .4s ease}

    .quickLog{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:999px;background:rgba(0,0,0,.18);color:var(--text);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;z-index:2;backdrop-filter:blur(8px)}
    [data-theme="dark"] .quickLog{background:rgba(255,255,255,.08);color:var(--accent2)}
    .quickLog:hover{background:var(--btn);color:var(--btnText)}

    .anchorBar{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:var(--panel);margin-bottom:8px}
    .anchorBar b{display:block;font-size:14px;margin-bottom:2px}
    .anchorBar .small{font-size:11px}
    .anchorScore{font-family:var(--display);font-size:24px;font-weight:600;line-height:1;color:var(--accent)}
    .anchorScore.pass{color:var(--good)}
    .anchorScore.fail{color:var(--danger)}

    /* Keyboard hint */
    kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10.5px;padding:2px 6px;border:1px solid var(--line);border-radius:5px;background:var(--panel2);color:var(--muted)}

    .seasonPill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.04em;background:var(--panel2);color:var(--muted);text-transform:uppercase;border:1px solid var(--line)}

    .clusterTag{display:inline-block;font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:5px;background:rgba(232,184,74,.14);color:var(--accent2);letter-spacing:.04em;text-transform:uppercase;margin-right:4px}
  

    /* === MAISON AJ LUXURY PASS v5 === */
    :root{--glass:rgba(255,250,240,.72);--glassLine:rgba(183,137,52,.22);--premiumGrad:linear-gradient(135deg,rgba(183,137,52,.22),rgba(255,250,240,.72) 42%,rgba(122,90,34,.08));}
    [data-theme="dark"]{--glass:rgba(18,18,32,.72);--glassLine:rgba(232,184,74,.24);--premiumGrad:linear-gradient(135deg,rgba(232,184,74,.20),rgba(23,23,42,.72) 44%,rgba(255,214,111,.07));}
    body{letter-spacing:-.006em;}
    .brandMark{width:46px;height:46px;border-radius:16px;border:1px solid var(--glassLine);display:grid;place-items:center;background:var(--premiumGrad);box-shadow:var(--shadowSm);font-family:var(--display);font-size:24px;font-weight:700;color:var(--accent2);letter-spacing:-.08em;flex:0 0 auto}
    .brandWrap{display:flex;gap:12px;align-items:center;min-width:0}.brand h1{font-size:36px;line-height:.86;letter-spacing:-.02em;font-style:normal}.brand h1 .pronounce{letter-spacing:.14em;margin-top:5px}.brand p{font-size:10px;letter-spacing:.12em}.top{align-items:center}.themeToggle{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}

const QUALITY_WEIGHTS={projection:.20,longevity:.20,composition:.25,distinctiveness:.15,signature:.20};
const QUALITY_FLOORS={composition:3,signature:3};

const ISO_E_DATA=[{"n":"1 & Only Jazz Club","h":"Dua Brand","ib":"D&G The One x MMM Jazz Club","fl":"DISTINCT","v":"YES","b":"DEPTH, LONG","sp":2,"w":"Chest","dna":"spicy amber, tobacco, vanilla, aromatic sage","fam":["spicy","amber","tobacco","vanilla","aromatic"],"imp":"The tobacco-vanilla-sage DNA already occupies warm amber territory. Iso E introduces a transparent cedarwood scaffold beneath these notes — invisible but structurally important. The aromatic sage note benefits most, gaining sharper definition against the woody base. The spicy amber accord extends its drydown because Iso E's fixative properties slow the evaporation of the lighter aromatic molecules while the tobacco-vanilla richness remains untouched on top.","sc":6,"se":"Fall/Winter","oc":"Evening / lounge / date","ti":"night"},{"n":"Acqua Di DUA","h":"Dua Brand","ib":"Acqua di Gio OG","fl":"DISTINCT","v":"YES","b":"AMP, LONG, PROJ","sp":2,"w":"Full coverage","dna":"marine citrus aromatic, watery woods, fresh masculine","fam":["marine","citrus","aquatic","woody"],"imp":"Major improvement target. Marine-aquatic fragrances are built from small volatile molecules that flash bright then vanish. Iso E Super's molecular weight (234 g/mol) is significantly heavier than typical aquatic compounds, acting as an anchor that bonds to skin lipids and slowly releases the watery-wood accord. Transforms this from a 3-hour skin scent to a 6-hour noticeable presence. The woody facet in the DNA directly harmonizes with cedarwood.","sc":6,"se":"Spring/Summer","oc":"Casual / beach / gym","ti":"day"},{"n":"Aphrodisiac","h":"Dua Brand","ib":"Initio Psychedelic Love","fl":"DISTINCT","v":"CAUTION","b":"—","sp":0,"w":"Sleeve test","dna":"hedione floral-resinous, sandalwood, patchouli","fam":["floral","woody"],"imp":"RISK: Psychedelic Love's DNA relies on hedione — a jasmine-like molecule prized for its airy, floating quality. Hedione is designed to hover above skin creating an ethereal aura. Iso E Super's cedarwood character is heavier and earthier, pulling the composition downward. The sandalwood and patchouli base may compete with rather than complement the cedarwood, creating a muddled woody-floral collision instead of the intended dreamy resinous float. Test on sleeve before committing.","sc":3,"se":"Fall/Winter","oc":"Date / intimate / evening","ti":"night"},{"n":"Aroma of Heaven","h":"Dua Brand","ib":"Hermes TdH vintage","fl":"DISTINCT","v":"YES","b":"AMP, DEPTH","sp":3,"w":"Pulse points","dna":"citrus vetiver, mineral woods, mature earthy masculine","fam":["citrus","vetiver","woody"],"imp":"One of the most natural pairings in the vault. Vetiver (the star of Terre d'Hermes DNA) is a woody-earthy molecule that shares structural similarities with Iso E Super — both are terpenoid-derived compounds with dry woody-mineral character. Applying Iso E beneath this scent is like adding more of what's already there. The citrus top notes get fixative support, and the mineral-earthy masculine quality is directly amplified without introducing any foreign character.","sc":9,"se":"Year-round","oc":"Office / outdoors","ti":"day"},{"n":"Bet On 67","h":"Dua Brand","ib":"Ralph Lauren Polo 67","fl":"DISTINCT","v":"YES","b":"AMP, LONG, BIND","sp":3,"w":"Full coverage","dna":"sporty citrus woods, clean aromatic, easy daytime fresh","fam":["citrus","woody","aromatic"],"imp":"Sporty citrus-aromatic DNA is composed of small, volatile terpene molecules (limonene, linalool) that evaporate rapidly from skin. Iso E Super's large lipophilic structure acts as a molecular net — it bonds to skin oils and creates a slow-release matrix for these smaller molecules. The clean aromatic facet gains cedarwood warmth, and overall wear time extends from approximately 4 hours to 6-7 hours. The woody base note in the DNA directly absorbs the Iso E.","sc":7,"se":"Spring/Summer","oc":"Casual / outdoors / sport","ti":"day"},{"n":"Black Widow","h":"Dua Brand","ib":"Kilian Black Phantom","fl":"DISTINCT","v":"YES","b":"DEPTH","sp":2,"w":"Chest only","dna":"rum, dark chocolate, coffee, almond, caramel, sandalwood-tonka","fam":["gourmand","vanilla","woody"],"imp":"Dense gourmand DNA — rum, chocolate, coffee, caramel — creates a thick aromatic wall. Iso E doesn't penetrate or alter these notes. Instead, it builds an invisible woody scaffold beneath the entire composition, like a polished hardwood floor under a heavy Persian rug. The sandalwood-tonka base absorbs the cedarwood naturally since they're from the same woody molecular family. Effect is subtle but adds architectural structure to what can otherwise be a shapeless sweet cloud.","sc":6,"se":"Fall/Winter","oc":"Evening / date / club","ti":"night"},{"n":"Bleu de Casino Elixir Extrait","h":"Dua Brand","ib":"BdC x Aventus x BR540 Extrait","fl":"DISTINCT","v":"YES","b":"AMP, LIFT","sp":2,"w":"Neck","dna":"blue incense woods, fruity smoky amber, sweet extrait richness","fam":["incense","woody","amber","fruity"],"imp":"The incense-wood backbone in this DNA contains compounds (olibanum, cedarwood derivatives) that naturally harmonize with Iso E Super. Adding Iso E amplifies the woody facet of the blue accord and lifts the sweet amber — the diffusive quality of cedarwood creates a radiant aura that carries the saffron-amber further from the body. The extrait concentration means less improvement than lighter concentrations, but the woody lift is still noticeable.","sc":7,"se":"Fall/Winter","oc":"Date / upscale casual","ti":"night"},{"n":"Bleu de Dua Attar","h":"Dua Brand","ib":"Bleu de Chanel Parfum","fl":"ANCHOR","v":"YES","b":"AMP, PROJ","sp":2,"w":"Pulse points","dna":"deep blue woods, incense, citrus, smooth ambered masculinity","fam":["woody","incense","citrus","amber"],"imp":"ANCHOR. The deep blue-woods accord in BdD Attar is built on molecules that occupy the same olfactory space as Iso E Super — woody, incense-like, subtly amber. Layering Iso E underneath is like turning the volume dial on the woody-incense channel from 7 to 9 without distortion. The citrus top notes get extended by the fixative base, and the smooth amber drydown gains a velvety cedarwood undertone. One of the cleanest amplifications possible.","sc":8,"se":"Year-round","oc":"Office / smart casual","ti":"both"},{"n":"Bleu de Dua Exclusive Extrait","h":"Dua Brand","ib":"Bleu de Chanel L'Exclusif","fl":"OVERLAP","v":"YES","b":"AMP","sp":2,"w":"Pulse points","dna":"elegant blue woods, refined incense, creamy polished depth","fam":["woody","incense"],"imp":"Shares the same blue-woods molecular family as BdD Attar but with more refinement and creaminess. The polished depth is delicate — Iso E adds warmth without disrupting the elegant equilibrium. Two sprays maximum; this is a case where restraint matters. The creamy polished quality merges with Iso E's velvety character, creating a richer but still sophisticated drydown. The incense note in the heart gains subtle reinforcement.","sc":7,"se":"Fall/Winter","oc":"Business formal / special","ti":"both"},{"n":"#Candy","h":"Dua Brand","ib":"Liz Claiborne Candies For Men (DDL)","fl":"DISTINCT","v":"YES","b":"AMP, LONG","sp":2,"w":"Neck/chest","dna":"watermelon, coriander, cardamom, green leaves, birch wood, cedar, sandalwood, oakmoss, musk","fam":["woody","chypre","spicy","green","musk"],"imp":"The woody-aromatic structure is a natural fit for Iso E Super — it sits in adjacent terpenoid territory and amplifies rather than obscures the existing character. Expect cleaner projection and a longer dry-down without losing definition.","sc":6,"se":"Spring/Summer","oc":"Casual / smart casual","ti":"both"},{"n":"Casino Royale Nights Extrait","h":"Dua Brand","ib":"Baccarat Rouge 540 Extrait","fl":"DISTINCT","v":"YES","b":"DEPTH, LONG, AMP","sp":2,"w":"Chest","dna":"saffron amberwood, airy sweetness, glowing woody sugar","fam":["amber","spicy","woody"],"imp":"The saffron-amberwood accord gains a velvety cedarwood anchor — Iso E sits beneath the glowing sweetness like a wooden picture frame around a gilde // Plane fitness: lower = better for flights. Penalizes loud, projecting, polarizing scents.
// 0 = perfect plane scent (oil or skin-close musk, won't bother seatmates)
// 10+ = avoid (gourmand bombs, oud, heavy florals, beast-mode projection)
function planeFitness(f){
  if(!f)return 99;
  const dna=(f.dna||[]).map(d=>String(d).toLowerCase());
  const name=(f.name||'').toLowerCase();
  const house=(f.house||'').toLowerCase();
  const insp=(f.inspiration||'').toLowerCase();
  const isOil=/yom & layl|miris oils|al-rehab|crown/i.test(house)||/\(oil\)$/.test(name);
  const isMusk=dna.some(d=>d.includes('musk'))||dna.some(d=>d.includes('powder'));
  
  let score=6;
  
  // Heavy penalties — never wear on a plane
  if(dna.some(d=>d.includes('gourmand')))score+=5;
  if(dna.some(d=>d.includes('oud')))score+=5;
  if(dna.some(d=>d.includes('tobacco')))score+=4;
  if(dna.some(d=>d.includes('smoke')))score+=4;
  if(dna.some(d=>d.includes('leather')))score+=4;
  // Sweet/vanilla/amber are softened if musk-led (skin-close composition)
  if(dna.some(d=>d.includes('sweet')))score+=isMusk?1:2;
  if(dna.some(d=>d.includes('vanilla')))score+=isMusk?1:2;
  if(dna.some(d=>d.includes('amber')))score+=isMusk?1:2;
  if(dna.some(d=>d.includes('spicy'))&&!isMusk)score+=1;
  if(dna.some(d=>d.includes('floral'))&&!isMusk)score+=2;
  if(dna.some(d=>d.includes('chypre')))score+=2;
  // High-projection ANCHOR/known-projector inspirations are NOT plane bottles even if "fresh"
  if(/aventus|sauvage|allure homme|le male|jpg|invictus|y edp|y le parfum|paradigme|pegasus|herod/i.test(insp))score+=3;
  if(/aventus|sauvage|fierce|imperial|profumo|hacivat|millesime/i.test(name+' '+insp))score+=2;
  // Dua "Attar" bottles are projection-amplified sprays (not true oils) — common misread
  if(/\battar\b/i.test(name)&&!isOil)score+=2;
  if((f.rating||0)>=5)score+=1; // 5/5 bottles tend to be statement-y
  
  // Big bonuses for skin-close, plane-appropriate
  if(isOil)score-=5; // oils = TSA-friendly + skin-close
  if(isMusk&&!dna.some(d=>d.includes('amber'))&&!dna.some(d=>d.includes('gourmand')))score-=4;
  // Very specific known-quiet picks
  if(/musk therapy|silver mountain|i am white|musk melody|cool water|grand masters|lionora|queening|j'adoube|blockade/i.test(insp))score-=3;
  if(/ana abiyedh|musk melody|silver \(oil\)|nor\b|wazir|raazi|rayees|limitless|gladiator/i.test(name))score-=2;
  
  return Math.max(0,score)
}

function compatible(a,b,sprayA,sprayB){

  if(seasonMatch(a.season,b.season)){score+=10;parts.push('+10 season match')}else if(!established){score-=15;parts.push('−15 season mismatch');bad.push({type:'Season mismatch',text:'Different seasons — wear separately.'})}

  if(lane&&!established){score-=20;parts.push('−20 lane war');bad.push({type:'Lane war',text:`${lane[0]} + ${lane[1]} fight each other — one will dominate and muddy the other.`})}

  const aDense=a.dna.some(x=>DENSE.includes(x));

  const heavyHeavy=a.rating>=4&&b.rating>=4&&aDense&&bDense&&!established;
  if(heavyHeavy){score-=18;parts.push('−18 heavy + heavy');bad.push({type:'Heavy + Heavy',text:'Both projection beasts stacked — headache territory.'})}

    if(totalSprays<=3){const b1=Math.min(12,(4-totalSprays)*4);score+=b1;parts.push(`+${b1} light spray rescues heavy+heavy`);sprayAdj.push({label:'Light spray restraint',delta:+b1,why:'Few sprays let both bottles project without crushing each other.'})}

    // Find which bottle holds the dominant lane note
    const aHasFirst=a.dna.includes(lane[0]),bHasFirst=b.dna.includes(lane[0]);
    // The DENSE side of the lane war is the one to suppress

    if(denseSide&&dominantSpray<lighterSpray){const b2=Math.min(10,(lighterSpray-dominantSpray)*4);score+=b2;parts.push(`+${b2} lane war eased by ratio`);sprayAdj.push({label:'Dominant lane suppressed',delta:+b2,why:'Spraying the heavier side less lets the lighter side breathe.'})}

}

function _roleKey(f){const dna=(f.dna||[])[0]||'';const s=(f.season||'').replace(/\s|·/g,'');return dna+'|'+s}

// Derive each pillar 1-5 from bottle data.
// Each pillar can be overridden by f.scores={projection,longevity,composition,distinctiveness,role,signature}
function pillarScores(f){
  const o=f.scores||{};
  const dna=f.dna||[];
  const rating=f.rating||3;
  const flag=f.flag||'';
  const insp=(f.inspiration||'').toLowerCase();
  const desc=((typeof FRAG_DESC!=='undefined'&&FRAG_DESC[f.name])||'').toLowerCase();

  // 1. Projection: loud DNA biases up, intimate DNA down
  let proj;
  if(o.projection)proj=o.projection;
  else{
    proj=2.5+(rating-3)*0.5;
    if(dna.some(d=>['Amber','Gourmand','Tobacco','Oud','Sweet','Spicy'].includes(d)))proj+=.7;
    if(dna.some(d=>['Aquatic','Musk / Powdery','Fresh'].includes(d))&&!dna.some(d=>['Amber','Gourmand'].includes(d)))proj-=.5;
    if(/extrait|elixir|absolu|intense|parfum|attar/.test(insp))proj+=.5;
    proj=Math.max(1,Math.min(5,proj));
  }

  // 2. Longevity: DENSE DNA + concentration cues
  let lon;
  if(o.longevity)lon=o.longevity;
  else{
    lon=2.5+(rating-3)*0.4;
    const denseHits=dna.filter(d=>DENSE.includes(d)).length;
    lon+=denseHits*0.4;
    if(/extrait|absolu|parfum|attar/.test(insp))lon+=.7;
    else if(/elixir|intense/.test(insp))lon+=.5;
    if(dna.some(d=>['Aquatic','Fresh','Citrus'].includes(d))&&!denseHits)lon-=.4;
    lon=Math.max(1,Math.min(5,lon));
  }

  // 3. Composition Quality: flag is the strongest signal (ANCHOR/JUSTIFIED = curated quality)
  let comp;
  if(o.composition)comp=o.composition;
  else{
    if(flag==='ANCHOR')comp=5;
    else if(flag==='JUSTIFIED')comp=4.5;
    else if(flag==='EXACT DUP')comp=2.5;
    else if(flag==='NEAR DUP')comp=3;
    else if(flag==='OVERLAP')comp=3.5;
    else comp=4; // DISTINCT or no flag
    // rating modifier
    comp+=(rating-4)*0.3;
    comp=Math.max(1,Math.min(5,comp));
  }

  // 4. DNA Distinctiveness: combines clone-fidelity (for cluster members) and uniqueness (for singletons)
  let dist;
  if(o.distinctiveness)dist=o.distinctiveness;
  else{
    const cluster=clusterOf(f);
    const cCount=cluster?(clusterCounts()[cluster]||1):0;
    if(!cluster)dist=4; // original / niche target
    else if(cCount===1)dist=4.5;
    else if(cCount<=3)dist=4;
    else if(cCount<=6)dist=3;
    else dist=2.5; // saturated cluster
    if(flag==='EXACT DUP')dist=Math.min(dist,2);
    if(flag==='NEAR DUP')dist=Math.min(dist,2.5);
    if(flag==='OVERLAP')dist=Math.min(dist,3);
    if(flag==='ANCHOR')dist=Math.max(dist,4);
    dist=Math.max(1,Math.min(5,dist));
  }

  // 5. Role Coverage: how essential is this bottle to its role
  let role;
  if(o.role)role=o.role;
  else{
    const rc=_roleCounts()[_roleKey(f)]||1;
    if(rc===1)role=5;
    else if(rc<=3)role=4;
    else if(rc<=6)role=3;
    else role=2;
    if(flag==='EXACT DUP')role=Math.min(role,2);
    if(flag==='NEAR DUP')role=Math.min(role,2.5);
    if(flag==='ANCHOR')role=Math.max(role,4);
    role=Math.max(1,Math.min(5,role));
  }

  // 6. Signature Potential: distinctive enough to be "yours"
  let sig;
  if(o.signature)sig=o.signature;
  else{
    if(flag==='ANCHOR')sig=4.5;
    else if(flag==='JUSTIFIED')sig=4;
    else if(flag==='EXACT DUP')sig=1.5;
    else if(flag==='NEAR DUP')sig=2;
    else if(flag==='OVERLAP')sig=2.5;
    else sig=3;
    if(rating===5)sig+=.3;
    sig=Math.max(1,Math.min(5,sig));
  }

  return {projection:+proj.toFixed(2),longevity:+lon.toFixed(2),composition:+comp.toFixed(2),distinctiveness:+dist.toFixed(2),role:+role.toFixed(2),signature:+sig.toFixed(2)}
}

function qualityScore(f){
  // Intrinsic bottle quality - no Role Coverage. Stable across collection changes.
  // Used for: purchase evaluation, ratings, comparing bottles independent of collection state.
  const p=pillarScores(f);
  const totalRaw=p.projection*QUALITY_WEIGHTS.projection
              +p.longevity*QUALITY_WEIGHTS.longevity
              +p.composition*QUALITY_WEIGHTS.composition
              +p.distinctiveness*QUALITY_WEIGHTS.distinctiveness
              +p.signature*QUALITY_WEIGHTS.signature;
  const total=Math.round(totalRaw*20); // 0-100 display
  const floors=QUALITY_FLOORS;
  const floorViolations=[];
  if(p.composition<floors.composition)floorViolations.push('Composition');
  if(p.signature<floors.signature)floorViolations.push('Signature');
  const meetsFloors=floorViolations.length===0;
  // Tier labels: 90+ Excellent, 80-89 Strong, 70-79 Solid, 60-69 Average, <60 Weak
  let tier;
  if(total>=90)tier='Excellent';
  else if(total>=80)tier='Strong';
  else if(total>=70)tier='Solid';
  else if(total>=60)tier='Average';
  else tier='Weak';
  return {pillars:{projection:p.projection,longevity:p.longevity,composition:p.composition,distinctiveness:p.distinctiveness,signature:p.signature},total,totalRaw:+totalRaw.toFixed(2),tier,floorViolations,meetsFloors}
}

function anchorScore(f){
  const p=pillarScores(f);
  // Weighted total on 1-5 scale, multiplied by 20 for 0-100 display
  const totalRaw=p.projection*ANCHOR_WEIGHTS_V2.projection
              +p.longevity*ANCHOR_WEIGHTS_V2.longevity
              +p.composition*ANCHOR_WEIGHTS_V2.composition
              +p.distinctiveness*ANCHOR_WEIGHTS_V2.distinctiveness
              +p.role*ANCHOR_WEIGHTS_V2.role
              +p.signature*ANCHOR_WEIGHTS_V2.signature;
  const total=Math.round(totalRaw*20);
  // Role-based threshold
  const rc=_roleCounts()[_roleKey(f)]||1;
  let thresholdRaw,thresholdLabel;
  if(rc===1){thresholdRaw=3.75;thresholdLabel='sole rep'}
  else if(rc<=3){thresholdRaw=4.00;thresholdLabel='1-2 competitors'}
  else{thresholdRaw=4.25;thresholdLabel='3+ competitors'}
  const threshold=Math.round(thresholdRaw*20);
  // Per-pillar floor enforcement
  const floors=ANCHOR_FLOORS_V2;
  const floorViolations=[];
  if(p.composition<floors.composition)floorViolations.push('Composition');
  if(p.role<floors.role)floorViolations.push('Role');
  if(p.signature<floors.signature)floorViolations.push('Signature');
  const meetsFloors=floorViolations.length===0;
  const pass=total>=threshold&&meetsFloors;
  // For backwards compatibility with existing callers, also expose old-style fields
  const cluster=clusterOf(f);
  const cCount=cluster?(clusterCounts()[cluster]||1):1;
  return {
    pillars:p,
    total,thresholdRaw,threshold,thresholdLabel,
    roleCount:rc,
    floorViolations,meetsFloors,
    pass,
    cluster,cCount,
    // legacy:
    reach:Math.round(p.projection*20),performance:Math.round(p.composition*20),trueness:Math.round(p.distinctiveness*20),versatility:Math.round(p.role*20)
  }
}



// HASH ROUTING — browser Back/Forward support
const ROUTE_ALIASES={home:'wear',wear:'wear',vault:'collection',collection:'collection',layer:'lab',lab:'lab',tools:'tools',settings:'settings',set:'settings',shelf:'shelf',display:'shelf',rotation:'shelf',compare:'compare','iso-e':'isoe',isoe:'isoe',dna:'wheel',wheel:'wheel',stats:'stats'};
function safeRouteId(id){return encodeURIComponent(String(id||''))}
function routeForState(){
  if(state.view==='collection'&&state.selected&&getF(state.selected))return '#/vault/bottle/'+safeRouteId(state.selected);
  if(state.view==='collection')return '#/vault';
  if(state.view==='lab')return '#/layer';
  if(state.view==='shelf')return '#/shelf';
  if(state.view==='tools')return '#/insights';
  if(state.view==='compare')return '#/insights/compare';
  if(state.view==='isoe')return '#/insights/isoe';
  if(state.view==='wheel')return '#/insights/dna';
  if(state.view==='stats')return '#/insights/stats';
  if(state.view==='settings')return '#/settings';
  return '#/wear';
}
function parseRoute(hash){
  let raw=String(hash||'').replace(/^#\/?/,'');
  const parts=raw.split('/').filter(Boolean).map(x=>decodeURIComponent(x));
  let view='wear',selected=null;
  if(!parts.length)return {view,selected,valid:false};
  const root=(parts[0]||'').toLowerCase();
  if(root==='vault'||root==='collection'){
    view='collection';
    if((parts[1]||'').toLowerCase()==='bottle'&&parts[2])selected=parts.slice(2).join('/');
  }else if(root==='tools'||root==='insights'){
    const sub=(parts[1]||'').toLowerCase();
    view=sub?ROUTE_ALIASES[sub]||'tools':'tools';
    if(!['tools','isoe','wheel','stats','compare'].includes(view))view='tools';
  }else{
    view=ROUTE_ALIASES[root]||'wear';
  }
  if(root==='shelf')view='shelf';
  if(view==='collection'&&selected&&!getF(selected))selected=null;
  if(view!=='collection')selected=null;
  return {view,selected,valid:!!ROUTE_ALIASES[root]||root==='vault'||root==='collection'||root==='tools'||root==='insights'||root==='shelf'};
}
function routeWeatherIfNeeded(view){
  if(view==='isoe'||view==='wear'||view==='tools'){
    const stale=!state.weather||state.weather.error||!state.weather.fetchedAt||(Date.now()-state.weather.fetchedAt)>20*60*1000;
    if(stale&&(state.city||state.weather?.source==='city'||state.weather?.source==='fallback')){fetchSharedWeather(true,false).then(()=>render()).catch(()=>{})}
  }
}
function syncRoute(replace=false){
  const route=routeForState();
  if(location.hash===route)return;
  try{history[replace?'replaceState':'pushState']({route},'',route)}catch(e){location.hash=route}
}
function navigateTo(view,{selected=null,wheelTag=null,replace=false,scroll=true}={}){
  state.view=view||'wear';
  state.selected=selected||null;
  if(wheelTag!==undefined)state.wheelTag=wheelTag;
  if(state.view!=='collection')state.selected=null;
  cleanDependents();
  save();
  syncRoute(replace);
  render();
  if(scroll){try{window.scrollTo({top:0,behavior:'smooth'})}catch(e){}}
  routeWeatherIfNeeded(state.view);
}
function applyCurrentRoute({replace=false,scroll=false}={}){
  const r=parseRoute(location.hash);
  state.view=r.view;
  state.selected=r.selected;
  if(state.view!=='wheel')state.wheelTag=null;
  cleanDependents();
  save();
  if(replace||!r.valid||!location.hash)syncRoute(true);
  render();
  if(scroll){try{window.scrollTo({top:0,behavior:'smooth'})}catch(e){}}
  routeWeatherIfNeeded(state.view);
}
window.addEventListener('popstate',()=>applyCurrentRoute({scroll:true}));

function sprayHint(r){
  const total=r.sprayA+r.sprayB;
  if(total===0)return 'Nothing applied';
  if(total===1)return 'Single spray, not really layering';
  if(total>5)return 'Likely over-applied';
  if(r.sprayA===r.sprayB)return 'Balanced layering';
  if(Math.abs(r.sprayA-r.sprayB)>=2)return r.sprayA>r.sprayB?'A leads, B accents':'B leads, A accents';
  return 'Slight A/B emphasis'
}

function animateScore(target){
  const el=document.getElementById('scoreNum');
  if(!el)return;
  const final=Math.max(0,Math.min(100,parseInt(target,10)||0));
  const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce){el.textContent=String(final);return}
  const start=0;
  const duration=650;
  const t0=performance.now();
  function easeOutCubic(t){return 1-Math.pow(1-t,3)}
  function step(now){
    const t=Math.min(1,(now-t0)/duration);
    el.textContent=String(Math.round(start+(final-start)*easeOutCubic(t)));
    if(t<1)requestAnimationFrame(step);
    else{
      el.textContent=String(final);
      el.classList.remove('scorePulse');
      void el.offsetWidth;
      el.classList.add('scorePulse');
    }
  }
  requestAnimationFrame(step);
}

const MOOD_DNA={
  'Confident':['Amber','Woody','Spicy','Tobacco','Chypre','Smoky'],
  'Relaxed':['Fougere','Aromatic','Green','Vetiver / Earthy','Fresh'],
  'Sharp':['Blue','Citrus','Aromatic','Aquatic','Fresh','Woody'],

  'Playful':['Fruity','Sweet','Citrus','Apple','Gourmand'],
  'Romantic':['Floral','Amber','Vanilla','Oud','Spicy','Iris','Sweet'],
  'Fresh':['Aquatic','Citrus','Fresh','Green','Marine','Musk / Powdery'],
  'Sophisticated':['Iris','Powdery','Chypre','Vetiver / Earthy','Woody','Leather','Oud'],
  'Loud':['Amber','Spicy','Smoky','Oud','Tobacco','Chypre','Woody']
};
const MOOD_BEAST=['Loud'];
function recommendWear(occasion,mood){
  let w=state.weather||{temp:70,humidity:45};
  let target,reason;
  if(w.temp>=78||w.humidity>=70){target=['Fresh','Aquatic','Citrus','Green','Musk / Powdery'];reason=`warm humid ${Math.round(w.temp)}°F → fresh aquatic`}
  else if(w.temp<=55){target=['Amber','Tobacco','Vanilla','Spicy','Woody','Gourmand','Oud'];reason=`cool ${Math.round(w.temp)}°F → cozy amber`}
  else if(w.temp>=68){target=['Blue','Aromatic','Woody','Fresh','Green','Citrus'];reason=`mild ${Math.round(w.temp)}°F → blue aromatic`}
  else{target=['Aromatic','Woody','Fresh','Fougere','Green'];reason=`cool mild ${Math.round(w.temp)}°F → aromatic fougere`}
  if(occasion&&occasion!=='Auto'){reason+=` · ${occasion.toLowerCase()}`}
  if(mood&&mood!=='Auto'){reason+=` · ${mood.toLowerCase()} mood`}
  const moodDna=mood&&mood!=='Auto'?(MOOD_DNA[mood]||[]):[];
  const isBeast=MOOD_BEAST.includes(mood);
  const recentIds=state.wearHistory.slice(0,5).map(w=>w.id);
  const scored=state.collection.map(f=>{
    const dnaFit=f.dna.filter(d=>target.includes(d)).length;
    const seasonFit=seasonForTemp(f,w.temp)?1:0;
    const recentPenalty=recentIds.includes(f.id)?-15:0;
    let occBoost=0;
    if(occasion&&occasion!=='Auto'){
      const has=(f.occasions||[]).includes(occasion);
      occBoost=has?25:-40;
    }
    let moodBoost=0;
    if(moodDna.length){
      const overlap=f.dna.filter(d=>moodDna.includes(d)).length;
      moodBoost=overlap*12-(overlap===0?20:0);
    }
    if(isBeast){
      // Loud favors higher-projection bottles: Aventus cluster, statement scents, full coverage
      const isStatement=(f.occasions||[]).some(o=>['Statement','Evening','Cocktail'].includes(o));
      const flag=(f.flag||'').toUpperCase();
      if(isStatement)moodBoost+=8;
      if(flag==='ANCHOR')moodBoost+=5;
      // Aventus / Sauvage / Aventus-cluster keywords
      const beastNames=/aventus|sauvage|stronger|drowning|invictus|elixir|fierce|absolu|salvo intense|yeah man|le beau|le male/i;
      if(beastNames.test(f.name||'')||beastNames.test(f.inspiration||''))moodBoost+=10;
    }
    const rawScore=dnaFit*15+seasonFit*15+f.rating*8+recentPenalty+occBoost+moodBoost+30;
    const fitScore=Math.max(0,Math.min(100,Math.round(rawScore)));
    const matched=f.dna.find(d=>target.includes(d));
    let why=matched?`${matched.toLowerCase()} fits today`:`${primary(f).toLowerCase()} accent`;
    if(occasion&&occasion!=='Auto'&&(f.occasions||[]).includes(occasion))why=`tagged ${occasion.toLowerCase()} · ${why}`;
    if(mood&&mood!=='Auto'){const overlap=f.dna.filter(d=>moodDna.includes(d));if(overlap.length)why=`${mood.toLowerCase()} (${overlap[0].toLowerCase()}) · ${why}`}
    if(recentPenalty)why+=' (worn recently)';
    return {f,fitScore,rawScore,why}
  }).sort((a,b)=>b.rawScore-a.rawScore);
  // Filter: if occasion or mood is set, only show bottles that actually match
  const filtered=scored.filter(({f})=>{
    if(occasion&&occasion!=='Auto'){
      if(!(f.occasions||[]).includes(occasion))return false;
    }
    if(mood&&mood!=='Auto'&&moodDna.length){
      const overlap=f.dna.filter(d=>moodDna.includes(d)).length;
      if(overlap===0)return false;
    }
    return true;
  });
  const finalList=filtered.length?filtered:scored.slice(0,4);
  let combo=null,best=0;
  // Performance: evaluate layering against the top recommendation pool instead of every bottle pair.
  const comboPool=(finalList.length?finalList:scored).slice(0,42).map(x=>x.f);
  for(let i=0;i<comboPool.length;i++){
    for(let j=i+1;j<comboPool.length;j++){
      const r=compatibleCore(comboPool[i],comboPool[j]);
      if(!r||r.clash)continue;
      const fit=comboPool[i].dna.concat(comboPool[j].dna).filter(d=>target.includes(d)).length;
      const total=r.score+fit*5;
      if(total>best){best=total;const full=compatible(comboPool[i],comboPool[j]);combo={a:comboPool[i].id,b:comboPool[j].id,why:full.why,score:r.score,ratio:full.ratio}}
    }
  }
  return {bottles:finalList,combo,reason}
}
function seasonForTemp(f,t){return t>=70?(f.season.includes('Spring')||f.season==='Year-round'):t<=55?(f.season.includes('Fall')||f.season==='Year-round'):true}
function planePicksCard(){
  // Top 5 plane-friendly bottles from collection, ranked by fitness score
  const ranked=state.collection

async function geocodeCity(name){
  const q=(name||'').trim();
  if(!q)return null;
  const url=`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=en&format=json`;
  const data=await fetch(url).then(r=>{if(!r.ok)throw new Error('geocode failed');return r.json()});
  const hit=data&&data.results&&data.results[0];
  if(!hit)return null;
  const label=[hit.name,hit.admin1,hit.country].filter(Boolean).join(', ');
  return {lat:hit.latitude,lon:hit.longitude,label};
}
async function resolveWeatherLocation(silent,allowDevice){
  const typed=(state.city||'').trim();
  if(typed){
    const g=await geocodeCity(typed);
    if(g)return {...g,source:'city'};
    if(!silent)toast(`Could not find ${typed}. Using fallback.`);
  }
  if(allowDevice&&navigator.geolocation){
    try{
      let pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:6000,enableHighAccuracy:false}));
      return {lat:pos.coords.latitude,lon:pos.coords.longitude,label:'Current location',source:'device'};
    }catch(e){if(!silent&&!typed)toast('Using Arlington VA fallback (no geolocation)')}
  }
  return {lat:38.88,lon:-77.10,label:'Arlington, VA',source:'fallback'};
}
async function fetchSharedWeather(silent,allowDevice){
  const cityKey=(state.city||'').trim().toLowerCase();
  if(state.weather&&!state.weather.error&&state.weather.fetchedAt&&(Date.now()-state.weather.fetchedAt)<20*60*1000&&(state.weather.cityKey||'')===cityKey)return state.weather;
  try{
    const loc=await resolveWeatherLocation(silent,allowDevice);
    let url=`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,rain,weather_code,wind_speed_10m,is_day&temperature_unit=fahrenheit&wind_speed_unit=mph`;
    let data=await fetch(url).then(r=>{if(!r.ok)throw new Error('weather failed');return r.json()});
    state.weather={
      temp:data.current.temperature_2m,
      feels:data.current.apparent_temperature,
      humidity:data.current.relative_humidity_2m,
      wind:data.current.wind_speed_10m||0,
      precip:data.current.precipitation||0,
      rain:data.current.rain||0,
      isDay:data.current.is_day,
      code:data.current.weather_code,
      condition:weatherCode(data.current.weather_code),
      reason:loc.source==='city'?`Live weather · ${loc.label}`:loc.source==='device'?'Live weather · current location':'Live weather · Arlington VA fallback',
      location:loc.label,
      source:loc.source,
      cityKey,
      fetchedAt:Date.now()
    };
    save();
    return state.weather;
  }catch(e){
    const staleCity=state.weather&&((state.weather.cityKey||'')!==cityKey||state.weather.cityKey==='__stale__');
    if(!state.weather||staleCity){
      state.weather={temp:70,feels:70,humidity:50,wind:3,precip:0,rain:0,isDay:1,code:0,condition:'Weather unavailable',reason:`Could not load ${state.city||'device location'} · using neutral fallback`,location:state.city||'Device location',source:'manual',cityKey,fetchedAt:0,error:true};
      save();
      if(!silent)toast('Weather unavailable — neutral fallback loaded')
    }else if(!silent){toast('Weather unavailable — keeping last reading')}

  }
}

function weatherProfile(w){

  const temp=Math.round(w.temp||70), feels=Math.round(w.feels??w.temp??70), hum=Math.round(w.humidity||0), wind=Math.round(w.wind||0), precip=Number(w.precip||w.rain||0);

  let density='Refined woods / fresh blue';

function arc(cx,cy,r,a0,a1){if(a1-a0<.001)return'';let x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);let large=a1-a0>Math.PI?1:0;return`M${cx},${cy} L${x0},${y0} A${r},${r} 0 ${large} 1 ${x1},${y1} Z`}

' · well covered':''}</div></div><div class="anchorScore ${c>=5?'fail':'pass'}">${c}</div></div>`).join(''):'<div class="empty">No major clusters detected.</div>'}</div></section>`
