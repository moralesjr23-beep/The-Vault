function displayDNAList(f){ const raw=String(f.dna||"").toLowerCase(); const out=[]; const add=x=>!out.includes(x)&&out.push(x); if(/fresh|clean|airy|soapy|bright|easy/.test(raw)) add("fresh"); if(/citrus|bergamot|lemon|orange|grapefruit|neroli|mandarin|pineapple|apple|pear/.test(raw)) add("citrus"); if(/marine|aquatic|watery|ocean|beach|melon/.test(raw)) add("aquatic"); if(/blue/.test(raw)) add("blue"); if(/green|grass|herbal|tea|fig|mint/.test(raw)) add("green"); if(/wood|woods|cedar|sandal|patchouli|moss/.test(raw)) add("woody"); if(/vetiver|mineral|earth/.test(raw)) add("vetiver / earthy"); if(/fougere|barbershop|lavender|aromatic/.test(raw)) add("fougere"); if(/musk|powder|iris|soapy/.test(raw)) add("musk / powdery"); if(/amber|resin|benzoin|incense/.test(raw)) add("amber"); if(/sweet|vanilla|tonka|sugar|fruity|praline|honey/.test(raw)) add("sweet"); if(/spice|spicy|pepper|cardamom|cinnamon|ginger|saffron/.test(raw)) add("spicy"); if(/gourmand|coffee|chocolate|caramel|dessert|boozy|rum/.test(raw)) add("gourmand"); if(/tobacco/.test(raw)) add("tobacco"); if(/oud/.test(raw)) add("oud"); return out.slice(0,4).length?out.slice(0,4):["fresh"]; }
function simplifyOccasionList(f){ const raw=String(f.occasion||"").toLowerCase(); const out=[]; const add=x=>!out.includes(x)&&out.push(x); if(/plane|flight|airplane/.test(raw)) add("Plane"); if(/office|business|work|formal|smart casual/.test(raw)) add("Office"); if(/date|romantic|intimate/.test(raw)) add("Date"); if(/casual|everyday|daytime|weekend|outdoors|social|beach|vacation/.test(raw)) add("Casual"); if(/gym|sport|poolside|fresh/.test(raw)) add("Gym"); if(/evening|night|club|lounge|special occasion|upscale/.test(raw)) add("Evening"); if(!out.length) add("Casual"); return out.slice(0,3); }
function getPlaneSafetyLevel(f){ const dna=displayDNAList(f); const rich=dna.some(x=>["amber","sweet","gourmand","spicy","tobacco","oud"].includes(x)); const fresh=dna.some(x=>["fresh","citrus","aquatic","blue","musk / powdery","green","fougere","vetiver / earthy"].includes(x)); if(dna.includes("gourmand")||dna.includes("oud")||dna.includes("tobacco")) return "Not Plane Safe"; if(fresh&&!rich) return "Plane Safe"; if(fresh) return "Safe Enough"; return "Not Plane Safe"; }

function collectionDetailView(f){ return `<div class="frag-hero" style="margin-top:16px"><div class="row" style="justify-content:space-between;align-items:start"><div><div class="kicker">Fragrance detail</div><h3 class="frag-hero-title">${esc(f.name)}</h3><div class="frag-hero-house">${esc(f.house)}</div><div class="frag-chip-row"><span class="frag-chip">✦ ${esc(f.inspiration||"Original")}</span><span class="frag-chip">◔ ${esc(f.season||"Unspecified")}</span><span class="frag-chip">◆ ${esc(simplifyOccasionList(f).join(" / "))}</span><span class="frag-chip">${state.favorites.includes(f.name)?"★ Favorite":"☆ Not favorite"}</span></div></div><div class="row"><button id="toggleFavoriteSelected" type="button">${state.favorites.includes(f.name)?"★ Favorite":"☆ Favorite"}</button><button id="clearSelectedFragrance" type="button">Close</button>${f._userAdded?'<button id="editSelectedFragrance" type="button">Edit</button><button id="deleteSelectedFragrance" type="button">Delete</button>':""}</div></div><div class="hero-summary"><div class="hero-stat"><div class="label">DNA</div><div class="value">${displayDNAList(f).map(x=>`<span class="pill">${esc(x)}</span>`).join("")}</div></div><div class="hero-stat"><div class="label">Best use</div><div class="value">${esc(simplifyOccasionList(f).join(" / "))}</div></div><div class="hero-stat"><div class="label">Plane safety</div><div class="value">${esc(getPlaneSafetyLevel(f))}</div></div><div class="hero-stat"><div class="label">Spray advice</div><div class="value">${esc(getSprayAdvice(f,"Office"))}</div></div></div><div class="grid cols-2" style="margin-top:14px"><div class="sheety"><div class="kicker">Inspired by / style</div><div style="margin-top:8px">${esc(f.inspiration)}</div></div><div class="sheety"><div class="kicker">Occasion / season</div><div style="margin-top:8px">${esc(f.occasion)}<br>${esc(f.season)}</div></div></div></div>`; }
function collectionView(){ const items=allCollection(); const houses=["All",...unique(items.map(f=>f.house)).sort((a,b)=>a.localeCompare(b))]; const dnas=["All",...unique(items.flatMap(f=>displayDNAList(f))).sort((a,b)=>a.localeCompare(b))]; const insp=["All",...unique(items.map(f=>f.inspiration||"Original")).sort((a,b)=>a.localeCompare(b))]; let filtered=items.filter(f=>{ if(state.collectionHouseFilter!=="All"&&f.house!==state.collectionHouseFilter) return false; if(state.collectionDNAFilter!=="All"&&!displayDNAList(f).includes(state.collectionDNAFilter)) return false; if(state.collectionInspirationFilter!=="All"&&(f.inspiration||"Original")!==state.collectionInspirationFilter) return false; if(state.collectionPlaneFilter!=="All"&&getPlaneSafetyLevel(f)!==state.collectionPlaneFilter) return false; if(state.collectionSearch&&!`${f.name} ${f.house} ${f.inspiration} ${f.dna} ${f.occasion}`.toLowerCase().includes(state.collectionSearch.toLowerCase())) return false; if(state.collectionTab!=="All"&&state.collectionTab!=="Plane"&&!simplifyOccasionList(f).includes(state.collectionTab)) return false; if(state.collectionTab==="Plane"&&getPlaneSafetyLevel(f)==="Not Plane Safe") return false; return true; }); if(state.collectionSort==="Name") filtered.sort((a,b)=>a.name.localeCompare(b.name)); if(state.collectionSort==="House") filtered.sort((a,b)=>a.house.localeCompare(b.house)||a.name.localeCompare(b.name)); if(state.collectionSort==="Season") filtered.sort((a,b)=>(a.season||"").localeCompare(b.season||"")||a.name.localeCompare(b.name)); if(state.collectionSort==="Favorites") filtered.sort((a,b)=>(state.favorites.includes(b.name)?1:0)-(state.favorites.includes(a.name)?1:0)||a.name.localeCompare(b.name)); const grouped={}; filtered.forEach(f=>{ const k=state.collectionHouseFilter!=="All"?"Filtered results":f.house; (grouped[k]=grouped[k]||[]).push(f); }); const groups=Object.entries(grouped); return `<div class="card"><div class="section-head"><div><div class="kicker">Collection</div><div class="section-title">${filtered.length} shown · full base ${BASE_COLLECTION.length}</div><div class="section-desc">Browse, filter, sort, and open fragrance details from the corrected master collection.</div></div></div><div class="row" style="margin-top:14px"><div class="field"><label>Search</label><input id="collectionSearch" value="${esc(state.collectionSearch)}" placeholder="Search collection"></div><div class="field" style="max-width:220px"><label>Tab</label><select id="collectionTab">${["All","Office","Casual","Date","Evening","Gym","Plane"].map(x=>`<option ${state.collectionTab===x?"selected":""}>${x}</option>`).join("")}</select></div><div class="field" style="max-width:220px"><label>House</label><select id="collectionHouseFilter">${houses.map(x=>`<option ${state.collectionHouseFilter===x?"selected":""}>${esc(x)}</option>`).join("")}</select></div><div class="field" style="max-width:220px"><label>Sort</label><select id="collectionSort">${["Name","House","Season","Favorites"].map(x=>`<option ${state.collectionSort===x?"selected":""}>${x}</option>`).join("")}</select></div></div><div class="row" style="margin-top:12px"><div class="field" style="max-width:260px"><label>DNA</label><select id="collectionDNAFilter">${dnas.map(x=>`<option ${state.collectionDNAFilter===x?"selected":""}>${esc(x)}</option>`).join("")}</select></div><div class="field" style="max-width:320px"><label>Inspired by / style</label><select id="collectionInspirationFilter">${insp.map(x=>`<option ${state.collectionInspirationFilter===x?"selected":""}>${esc(x)}</option>`).join("")}</select></div><div class="field" style="max-width:220px"><label>Plane</label><select id="collectionPlaneFilter">${["All","Plane Safe","Safe Enough","Not Plane Safe"].map(x=>`<option ${state.collectionPlaneFilter===x?"selected":""}>${x}</option>`).join("")}</select></div><div class="row" style="align-items:end"><button id="resetCollectionFilters" type="button">Reset filters</button></div></div><div class="card" style="margin-top:16px"><button class="acc-head" data-acc="collectionAdd" type="button"><div class="acc-copy"><div class="kicker">Collection</div><div class="acc-title">Add fragrance</div><div class="acc-desc">Open the add-fragrance sheet.</div></div><div class="acc-toggle">${state.expanded.collectionAdd?"–":"+"}</div></button>${state.expanded.collectionAdd?'<div class="acc-body"><div class="row"><button id="openAddFragranceSheet" type="button">Add fragrance</button></div></div>':""}</div><div class="card" style="margin-top:16px"><button class="acc-head" data-acc="collectionAll" type="button"><div class="acc-copy"><div class="kicker">Collection</div><div class="acc-title">All fragrances</div><div class="acc-desc">Browse every fragrance in the filtered collection.</div></div><div class="acc-toggle">${state.expanded.collectionAll?"–":"+"}</div></button>${state.expanded.collectionAll?`<div class="acc-body">${groups.length?groups.map(([g,arr])=>`<div class="card" style="margin-top:4px"><div class="kicker">${esc(g)}</div><div class="muted" style="margin-top:4px">${arr.length} fragrances</div><div class="grid" style="margin-top:12px">${arr.map(f=>`<button class="listbtn" data-open-fragrance="${esc(f.name)}"><div class="collection-fragrance-card"><div><div class="cf-label">Fragrance</div><div class="cf-name">${esc(f.name)} ${state.favorites.includes(f.name)?"★":""}</div><div class="cf-house" style="margin-top:6px">${esc(f.house)}</div></div><div><div class="cf-label">DNA</div><div>${displayDNAList(f).map(x=>`<span class="pill">${esc(x)}</span>`).join("")}</div></div><div><div class="cf-label">Occasion</div><div class="cf-meta">${esc(simplifyOccasionList(f).join(" / "))}</div></div><div><div class="cf-label">Style</div><div class="cf-meta">${esc(f.inspiration)}</div></div></div></button>`).join("")}</div></div>`).join(""):'<div class="empty-state">No fragrances match these filters.</div>'}</div>`:""}</div>${state.selectedFragrance?collectionDetailView(state.selectedFragrance):""}</div>`; }
function wearView(){ const items=allCollection(); const picks=getWearTodayPicks(items,state.wearOccasion,5); const selected=items.find(f=>f.name===state.wearSelected); const log=state.wearLog.filter(w=>{ if(state.wearLogSearch&&!`${w.fragrance} ${w.notes||""} ${w.occasion||""}`.toLowerCase().includes(state.wearLogSearch.toLowerCase())) return false; if(state.wearLogOccasionFilter!=="All"&&w.occasion!==state.wearLogOccasionFilter) return false; if(state.wearLogDateFrom&&w.date<state.wearLogDateFrom) return false; if(state.wearLogDateTo&&w.date>state.wearLogDateTo) return false; return true; }); return `<div class="grid"><div class="card"><div class="kicker">Wear today</div><h3>Pick generator + manual log</h3><div class="row"><div class="field"><label>Occasion</label><select id="wearOccasion">${OCCASIONS.map(x=>`<option ${state.wearOccasion===x?"selected":""}>${x}</option>`).join("")}</select></div><div class="field"><label>Environment</label><select id="wearEnvironment">${ENVIRONMENTS.map(x=>`<option ${state.wearEnvironment===x?"selected":""}>${x}</option>`).join("")}</select></div></div><div class="grid cols-3" style="margin-top:14px">${picks.map((f,i)=>`<button class="listbtn" data-apply-pick="${esc(f.name)}"><div class="kicker">${["Safest pick","Most unique","Best performer","Strong backup","Fifth option"][i]||`Pick ${i+1}`}</div><strong>${esc(f.name)}</strong><div class="muted">${esc(f.house)}</div><div style="margin-top:6px">${displayDNAList(f).map(x=>`<span class="pill">${esc(x)}</span>`).join("")}</div><div class="small muted" style="margin-top:6px">Last worn: ${esc(getLastWornDate(f.name))}</div><div style="margin-top:8px">${esc(getSprayAdvice(f,state.wearOccasion))}</div></button>`).join("")}</div></div><div class="grid cols-2"><div class="card"><div class="section-head"><div><div class="kicker">Manual log</div><h3>Log a wear</h3></div><button id="toggleWearLayering" type="button">${state.wearIsLayering?"◌ Layering on":"◌ Log as layering"}</button></div><div class="field" style="margin-top:12px"><label>Fragrance</label><input id="wearSelectedSearch" list="wearFragList" value="${esc(state.wearSelected)}" placeholder="Search fragrance..."><datalist id="wearFragList">${items.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(f=>`<option value="${esc(f.name)}">`).join("")}</datalist></div>${state.wearIsLayering?`<div class="field" style="margin-top:10px"><label>Second fragrance (layer)</label><input id="wearLayerSecondSearch" list="wearLayerList" value="${esc(state.wearLayerSecond)}" placeholder="Search second fragrance..."><datalist id="wearLayerList">${items.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(f=>`<option value="${esc(f.name)}">`).join("")}</datalist></div><div class="field" style="margin-top:10px"><label>Top sprays</label><input id="wearLayerSecondSprays" type="number" min="1" max="8" value="${esc(String(state.wearLayerSecondSprays))}"></div>`:""}<div class="row" style="margin-top:10px"><div class="field"><label>Date</label><input id="wearDate" type="date" value="${esc(state.wearDate)}"></div><div class="field"><label>Sprays / amount</label><input id="wearAmount" value="${esc(state.wearAmount)}" placeholder="${selected?esc(getSprayAdvice(selected,state.wearOccasion)):"3 sprays"}"></div></div><div class="field" style="margin-top:10px"><label>Notes</label><textarea id="wearNotes">${esc(state.wearNotes)}</textarea></div><div class="row" style="margin-top:12px"><button id="saveWear" class="btn-primary" type="button">Save wear</button></div></div><div class="card"><div class="section-head"><div><div class="kicker">History</div><h3>${state.wearLog.length} entries</h3></div></div><div class="row" style="margin-top:10px"><div class="field"><label>Search</label><input id="wearLogSearch" value="${esc(state.wearLogSearch)}" placeholder="Fragrance, occasion, notes..."></div><div class="field" style="max-width:160px"><label>Occasion</label><select id="wearLogOccasionFilter">${["All",...OCCASIONS].map(x=>`<option ${state.wearLogOccasionFilter===x?"selected":""}>${x}</option>`).join("")}</select></div></div><div class="row" style="margin-top:8px"><div class="field"><label>From</label><input id="wearLogDateFrom" type="date" value="${esc(state.wearLogDateFrom)}"></div><div class="field"><label>To</label><input id="wearLogDateTo" type="date" value="${esc(state.wearLogDateTo)}"></div><div style="align-self:end"><button id="clearWearLogFilters" type="button">Reset</button></div></div><div class="grid" style="margin-top:10px;max-height:420px;overflow-y:auto">${log.length?log.map((w,idx)=>`<div class="listbtn"><div style="display:flex;justify-content:space-between;align-items:start"><div><strong>${esc(w.fragrance)}</strong>${w.layerWith?` <span class="small muted">+ ${esc(w.layerWith)}</span>`:""}<div class="small muted" style="margin-top:4px">${esc(w.date)} · ${esc(w.occasion)}</div>${w.amount?`<div class="small" style="margin-top:2px">${esc(w.amount)}</div>`:""}${w.notes?`<div class="small muted" style="margin-top:4px">${esc(w.notes)}</div>`:""}</div><button data-delete-wear="${idx}" type="button">✕</button></div></div>`).join(""):'<div class="empty-state">No wears logged yet.</div>'}</div></div></div></div>`; }
function layerView(){ const items=allCollection(); const base=items.find(f=>f.name===state.layerBase); const top=items.find(f=>f.name===state.layerTop); const shared=base&&top?displayDNAList(base).filter(x=>displayDNAList(top).includes(x)):[]; const score=Math.max(1,Math.min(10,5+shared.length*2)); return `<div class="grid"><div class="card"><div class="kicker">Smart layering suggestions</div><h3>Choose your base and top</h3><div class="grid cols-2" style="margin-top:16px"><div class="field"><label>Base fragrance</label><input id="layerBaseSearch" list="layerBaseList" value="${esc(state.layerBase)}" placeholder="Search base..."><datalist id="layerBaseList">${items.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(f=>`<option value="${esc(f.name)}">`).join("")}</datalist></div><div class="field"><label>Top fragrance</label><input id="layerTopSearch" list="layerTopList" value="${esc(state.layerTop)}" placeholder="Search top..."><datalist id="layerTopList">${items.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(f=>`<option value="${esc(f.name)}">`).join("")}</datalist></div></div><div class="grid cols-4" style="margin-top:16px"><div class="field"><label>Base sprays</label><input id="layerBaseSprays" type="number" min="1" max="6" value="${state.layerBaseSprays}"></div><div class="field"><label>Top sprays</label><input id="layerTopSprays" type="number" min="1" max="6" value="${state.layerTopSprays}"></div><div class="field"><label>Projection mode</label><select id="layerProjectionMode">${["Close","Balanced","Louder"].map(x=>`<option ${state.layerProjectionMode===x?"selected":""}>${x}</option>`).join("")}</select></div><div class="field"><label>Occasion</label><select id="layerOccasion">${OCCASIONS.map(x=>`<option ${state.layerOccasion===x?"selected":""}>${x}</option>`).join("")}</select></div></div><div class="row" style="margin-top:12px"><button id="saveLayerCombo" type="button">Save combo</button><button id="logLayerComboAsWear" type="button">Log as wear</button></div></div><div class="grid cols-3"><div class="stat"><div class="kicker">Synergy score</div><div class="num">${score}/10</div><div class="meter" style="margin-top:8px"><span style="width:${score*10}%"></span></div></div><div class="stat"><div class="kicker">Shared DNA</div><div style="margin-top:8px">${shared.length?shared.map(x=>`<span class="pill">${esc(x)}</span>`).join(""):"Little overlap"}</div></div><div class="stat"><div class="kicker">Layering note</div><div style="margin-top:8px">${base&&top?esc(`Use ${state.layerBaseSprays} spray(s) of ${base.name} and ${state.layerTopSprays} spray(s) of ${top.name}. Keep the fresher side lighter and higher.`):"Pick two fragrances."}</div></div></div><div class="card"><button class="acc-head" data-acc="layerWhy" type="button"><div class="acc-copy"><div class="kicker">Layering</div><div class="acc-title">Why this works</div><div class="acc-desc">Open for the blend explanation.</div></div><div class="acc-toggle">${state.expanded.layerWhy?"–":"+"}</div></button>${state.expanded.layerWhy?`<div class="acc-body">${base&&top?esc(shared.length?`These two connect through ${shared.join(", ")} so the blend should feel coherent if you keep one fragrance clearly leading.`:"These two do not share much direct DNA, so keep the top lighter and let the base lead."):"Pick two fragrances."}</div>`:""}</div><div class="card"><button class="acc-head" data-acc="layerSaved" type="button"><div class="acc-copy"><div class="kicker">Layering</div><div class="acc-title">Saved combos</div><div class="acc-desc">Your saved pairings.</div></div><div class="acc-toggle">${state.expanded.layerSaved?"–":"+"}</div></button>${state.expanded.layerSaved?`<div class="acc-body"><div class="grid cols-2">${state.layerCombos.length?state.layerCombos.map((c,i)=>`<button class="listbtn" data-load-layer="${i}"><strong>${esc(c.base)}</strong><div class="muted">Base</div><div style="margin-top:8px"><strong>${esc(c.top)}</strong></div><div class="muted">Top</div></button>`).join(""):'<div class="empty-card">No saved combos yet.</div>'}</div></div>`:""}</div></div>`; }
function displaySections(items,season){ const score=f=>{ let s=0; const dna=displayDNAList(f); const sea=(f.season||"").toLowerCase(); if(/spring|summer/.test(season.toLowerCase())){ if(/spring|summer|year-round/.test(sea)) s+=4; if(dna.some(x=>["fresh","citrus","aquatic","green","blue","musk / powdery"].includes(x))) s+=2; } else { if(/fall|winter|year-round/.test(sea)) s+=4; if(dna.some(x=>["amber","sweet","gourmand","woody","spicy","tobacco","oud"].includes(x))) s+=2; } return s; }; const ranked=items.slice().sort((a,b)=>score(b)-score(a)); const display=ranked.slice(0,30); const anchors=display.slice(0,8), daily=display.slice(8,20), statement=display.slice(20,30); return {anchors,daily,statement,display}; }
function displayView(){ const season=state.seasonMode==="Auto"?((m=>m<3?"Winter":m<6?"Spring":m<9?"Summer":"Fall")(new Date().getMonth()+1)):state.seasonMode; const sections=displaySections(allCollection(),season); const names=new Set(sections.display.map(f=>f.name)); const putAway=allCollection().filter(f=>!names.has(f.name)).slice(0,10); return `<div class="grid"><div class="card"><div class="section-head"><div><div class="kicker">Display planner</div><h3>${esc(season)} 30-bottle display</h3></div><div class="field" style="max-width:220px"><label>Season mode</label><select id="seasonMode">${["Auto","Spring","Summer","Fall","Winter"].map(x=>`<option ${state.seasonMode===x?"selected":""}>${x}</option>`).join("")}</select></div></div></div>${[["displayAnchors","Anchors",sections.anchors],["displayDaily","Daily Drivers",sections.daily],["displayStatement","Statement Pieces",sections.statement]].map(([key,title,arr])=>`<div class="card"><button class="acc-head" data-acc="${key}" type="button"><div class="acc-copy"><div class="kicker">Display</div><div class="acc-title">${title}</div><div class="acc-desc">${arr.length} bottles in this section.</div></div><div class="acc-toggle">${state.expanded[key]?"–":"+"}</div></button>${state.expanded[key]?`<div class="acc-body"><div class="grid cols-2">${arr.map(f=>`<div class="shelf-card"><strong>${esc(f.name)}</strong><div class="muted">${esc(f.house)}</div></div>`).join("")}</div></div>`:""}</div>`).join("")}<div class="card"><button class="acc-head" data-acc="displayPutAway" type="button"><div class="acc-copy"><div class="kicker">Display</div><div class="acc-title">Put away for now</div><div class="acc-desc">These fit the current season less well.</div></div><div class="acc-toggle">${state.expanded.displayPutAway?"–":"+"}</div></button>${state.expanded.displayPutAway?`<div class="acc-body"><div class="grid cols-2">${putAway.map(f=>`<div class="shelf-card"><strong>${esc(f.name)}</strong><div class="muted">${esc(f.house)}</div></div>`).join("")}</div></div>`:""}</div></div>`; }
function buyView(){ const candidate=state.buy.name||state.buy.inspiration||state.buy.dna?state.buy:state.buyDraft; let overlaps=[]; if(candidate.name||candidate.inspiration||candidate.dna) overlaps=allCollection().map(f=>{ let s=0; if(candidate.inspiration&&norm(candidate.inspiration)===norm(f.inspiration)) s+=4; const cdna=String(candidate.dna||"").toLowerCase(); displayDNAList(f).forEach(tag=>{ if(cdna.includes(tag)) s+=2; }); if(candidate.occasion&&String(candidate.occasion).toLowerCase().includes((simplifyOccasionList(f)[0]||"").toLowerCase())) s+=1; return {f,s}; }).sort((a,b)=>b.s-a.s).slice(0,5); const best=overlaps[0]?.s||0; const verdict=!candidate.name&&!candidate.inspiration&&!candidate.dna?"Add candidate details":best>=9?"Good but redundant":best>=6?"Interesting but unnecessary":best>=3?"Worth considering":"Strong add"; return `<div class="card"><div class="kicker">Buy or Skip</div><h3>Gap fill or redundancy check</h3><div class="row"><div class="field"><label>Fragrance name</label><input id="buyName" value="${esc(state.buyDraft.name)}"></div><div class="field"><label>House</label><input id="buyHouse" value="${esc(state.buyDraft.house)}"></div></div><div class="row" style="margin-top:12px"><div class="field"><label>Inspired by / style</label><input id="buyInspiration" value="${esc(state.buyDraft.inspiration)}"></div><div class="field"><label>DNA</label><input id="buyDNA" value="${esc(state.buyDraft.dna)}"></div><div class="field"><label>Occasion</label><input id="buyOccasion" value="${esc(state.buyDraft.occasion)}"></div></div><div class="row" style="margin-top:12px"><button id="analyzeBuy" type="button">Analyze</button><button id="resetBuy" type="button">Reset</button></div><div class="grid cols-3" style="margin-top:16px"><div class="card"><div class="kicker">Verdict</div><div style="margin-top:8px"><span class="badge">${esc(verdict)}</span></div></div><div class="card"><div class="kicker">Closest overlap</div><div style="margin-top:8px">${overlaps[0]?esc(overlaps[0].f.name):"—"}</div></div><div class="card"><div class="kicker">Reason</div><div style="margin-top:8px">${esc(best>=9?"Very close to something you already own.":best>=6?"More sidegrade than gap-filler.":best>=3?"Some overlap, but still usable.":"Does not appear heavily covered by the collection.")}</div></div></div></div>`; }
function hobbyView(){ return `<div class="grid"><div class="card"><div class="kicker">Hobby Lab</div><h3>Plan future pickups</h3><div class="grid cols-2" style="margin-top:12px"><div class="field"><label>Name</label><input id="wishlistName" value="${esc(state.wishlistDraft.name)}"></div><div class="field"><label>House</label><input id="wishlistHouse" value="${esc(state.wishlistDraft.house)}"></div></div><div class="row" style="margin-top:12px"><div class="field"><label>Why</label><input id="wishlistWhy" value="${esc(state.wishlistDraft.why)}"></div><div class="field"><label>Priority</label><select id="wishlistPriority">${["Sample First","Full Bottle","Backup Bottle","Decant First"].map(x=>`<option ${state.wishlistDraft.priority===x?"selected":""}>${x}</option>`).join("")}</select></div><div class="field"><label>Price target</label><input id="wishlistPrice" value="${esc(state.wishlistDraft.price)}" placeholder="$"></div></div><div class="row" style="margin-top:12px"><button id="addWishlistItem" type="button">Add to wishlist</button></div><div class="grid" style="margin-top:14px">${state.wishlist.length?state.wishlist.map((w,idx)=>`<div class="card"><div style="display:flex;justify-content:space-between;gap:10px"><div><strong>${esc(w.name)}</strong><div class="muted">${esc(w.house||"Wishlist")}</div><div class="small muted" style="margin-top:6px">${esc(w.priority||"")} ${w.price?`· ${esc(w.price)}`:""}</div><div style="margin-top:6px">${esc(w.why||"")}</div></div><button data-del-wish="${idx}" type="button">Delete</button></div></div>`).join(""):'<div class="empty-state">No wishlist items yet.</div>'}</div></div></div>`; }
function render(){ document.documentElement.setAttribute("data-theme",state.theme); const primary=state.view==="Wear Today"?"Wear":state.view==="Layering"?"Layer":MORE_VIEWS.includes(state.view)?"More":state.view; document.getElementById("app").innerHTML=`<div class="top"><div class="brand"><div class="brand-row"><div class="brandmark">V</div><div><small>The Vault</small><h1>AJ's Fragrance Collection</h1><p>Luxury collection operating system</p></div></div></div><div class="tabs">${PRIMARY_VIEWS.map(v=>`<button type="button" class="tab ${primary===v?'active':''}" data-view="${v}"><span>${({Home:"🏠",Collection:"◫",Wear:"☀️",Layer:"◌",More:"···"}[v]||"•")}</span><span>${v}</span></button>`).join("")}</div>${primary==="More"?`<div class="subnav">${MORE_VIEWS.map(v=>`<button type="button" class="${state.view===v?'active':''}" data-more="${v}">${v}</button>`).join("")}</div>`:""}</div><div class="bottom-tab-bar">${PRIMARY_VIEWS.map(v=>`<button type="button" class="btab ${primary===v?'active':''}" data-view="${v}"><span>${({Home:"🏠",Collection:"◫",Wear:"☀️",Layer:"◌",More:"···"}[v]||"•")}</span></button>`).join("")}</div>${state.view==="Home"?homeView():""}${state.view==="Collection"?collectionView():""}${state.view==="Wear Today"?wearView():""}${state.view==="Layering"?layerView():""}${state.view==="Display"?displayView():""}${state.view==="Buy or Skip"?buyView():""}${state.view==="Hobby Lab"?hobbyView():""}${sheetView()}${toastView()}`; bindEvents(); }
function bindValue(id,fn){ const el=document.getElementById(id); if(!el) return; el.oninput=el.onchange=e=>fn(e.target.value); }
function bindEvents(){ 
 document.querySelectorAll("[data-view]").forEach(btn=>btn.onclick=()=>{ const v=btn.dataset.view; state.view=v==="Wear"?"Wear Today":v==="Layer"?"Layering":v==="More"?(MORE_VIEWS.includes(state.view)?state.view:"Display"):v; render(); });
 document.querySelectorAll("[data-more]").forEach(btn=>btn.onclick=()=>{ state.view=btn.dataset.more; render(); });
 document.querySelectorAll("[data-acc]").forEach(btn=>btn.onclick=()=>{ const k=btn.dataset.acc; state.expanded[k]=!state.expanded[k]; render(); });
 document.querySelectorAll("[data-open-fragrance]").forEach(btn=>btn.onclick=()=>{ state.selectedFragrance=allCollection().find(f=>f.name===btn.dataset.openFragrance); render(); });
 document.querySelectorAll("[data-apply-pick]").forEach(btn=>btn.onclick=()=>{ const f=allCollection().find(x=>x.name===btn.dataset.applyPick); if(!f) return; state.wearSelected=f.name; state.wearAmount=getSprayAdvice(f,state.wearOccasion); render(); });
 document.querySelectorAll("[data-delete-wear]").forEach(btn=>btn.onclick=()=>{ state.wearLog.splice(Number(btn.dataset.deleteWear),1); save(WEAR_KEY,state.wearLog); render(); });
 document.querySelectorAll("[data-load-layer]").forEach(btn=>btn.onclick=()=>{ const c=state.layerCombos[Number(btn.dataset.loadLayer)]; if(!c) return; state.layerBase=c.base; state.layerTop=c.top; state.layerBaseSprays=c.baseSprays; state.layerTopSprays=c.topSprays; state.layerProjectionMode=c.projection; state.layerOccasion=c.occasion; render(); });
 document.querySelectorAll("[data-del-wish]").forEach(btn=>btn.onclick=()=>{ state.wishlist.splice(Number(btn.dataset.delWish),1); save(WISHLIST_KEY,state.wishlist); render(); });
 const closeIds=["closeSheetBtn","closeSheetBtn2","closeSheetBtn3"]; closeIds.forEach(id=>{ const el=document.getElementById(id); if(el) el.onclick=()=>{ closeSheet(); render(); }; });
 const backdrop=document.getElementById("sheetBackdrop"); if(backdrop) backdrop.onclick=()=>{ closeSheet(); render(); };
 const themeToggle=document.getElementById("themeToggle"); if(themeToggle) themeToggle.onclick=()=>{ state.theme=state.theme==="dark"?"light":"dark"; localStorage.setItem(THEME_KEY,state.theme); render(); };
 const openAdd=document.getElementById("openAddFragranceSheet"); if(openAdd) openAdd.onclick=()=>{ openSheet("addFragrance"); render(); };
 const runAnalyzer=document.getElementById("runAnalyzer"); if(runAnalyzer) runAnalyzer.onclick=()=>localAnalyzeFragranceDraft();
 const saveFr=document.getElementById("saveFragranceBtn"); if(saveFr) saveFr.onclick=()=>saveUserFragrance();
 const clearFr=document.getElementById("clearFragranceBtn"); if(clearFr) clearFr.onclick=()=>{ state.newFragrance={house:"",name:"",inspiration:"",dna:"",occasion:"Casual",season:"Year-round"}; state.editingFragranceId=null; render(); };
 const confirmDeleteBtn=document.getElementById("confirmDeleteBtn"); if(confirmDeleteBtn&&state.pendingDelete) confirmDeleteBtn.onclick=()=>deleteUserFragrance(state.pendingDelete.id);
 const toggleFav=document.getElementById("toggleFavoriteSelected"); if(toggleFav&&state.selectedFragrance) toggleFav.onclick=()=>{ const set=new Set(state.favorites); set.has(state.selectedFragrance.name)?set.delete(state.selectedFragrance.name):set.add(state.selectedFragrance.name); state.favorites=[...set]; save(FAVORITES_KEY,state.favorites); render(); };
 const clearSel=document.getElementById("clearSelectedFragrance"); if(clearSel) clearSel.onclick=()=>{ state.selectedFragrance=null; render(); };
 const editSel=document.getElementById("editSelectedFragrance"); if(editSel&&state.selectedFragrance) editSel.onclick=()=>startEditUserFragrance(state.selectedFragrance.id);
 const delSel=document.getElementById("deleteSelectedFragrance"); if(delSel&&state.selectedFragrance) delSel.onclick=()=>{ state.pendingDelete={id:state.selectedFragrance.id,name:state.selectedFragrance.name}; openSheet("confirmDelete"); render(); };
 const resetCollection=document.getElementById("resetCollectionFilters"); if(resetCollection) resetCollection.onclick=()=>{ state.collectionSearch=""; state.collectionHouseFilter="All"; state.collectionDNAFilter="All"; state.collectionInspirationFilter="All"; state.collectionPlaneFilter="All"; state.collectionSort="Name"; state.collectionTab="All"; render(); };
 const toggleWearLayering=document.getElementById("toggleWearLayering"); if(toggleWearLayering) toggleWearLayering.onclick=()=>{ state.wearIsLayering=!state.wearIsLayering; render(); };
 const saveWear=document.getElementById("saveWear"); if(saveWear) saveWear.onclick=()=>{ const f=allCollection().find(x=>x.name===state.wearSelected); if(!f) return pushToast("Select a fragrance first","error"); const entry={date:state.wearDate,fragrance:f.name,house:f.house,occasion:state.wearOccasion,amount:state.wearAmount||getSprayAdvice(f,state.wearOccasion),notes:state.wearNotes.trim()}; if(state.wearIsLayering&&state.wearLayerSecond){ entry.layerWith=state.wearLayerSecond; entry.layerWithSprays=Number(document.getElementById("wearLayerSecondSprays")?.value||state.wearLayerSecondSprays||1); entry.amount=`2 base + ${entry.layerWithSprays} top (${entry.layerWith})`; } state.wearLog.unshift(entry); save(WEAR_KEY,state.wearLog); state.wearAmount=""; state.wearNotes=""; pushToast(`Logged: ${entry.fragrance}${entry.layerWith?" + "+entry.layerWith:""}`); render(); };
 const clearWearFilters=document.getElementById("clearWearLogFilters"); if(clearWearFilters) clearWearFilters.onclick=()=>{ state.wearLogSearch=""; state.wearLogOccasionFilter="All"; state.wearLogDateFrom=""; state.wearLogDateTo=""; render(); };
 const saveLayerCombo=document.getElementById("saveLayerCombo"); if(saveLayerCombo) saveLayerCombo.onclick=()=>{ state.layerCombos.unshift({base:state.layerBase,top:state.layerTop,baseSprays:Number(document.getElementById("layerBaseSprays")?.value||state.layerBaseSprays),topSprays:Number(document.getElementById("layerTopSprays")?.value||state.layerTopSprays),projection:state.layerProjectionMode,occasion:state.layerOccasion}); state.layerCombos=state.layerCombos.slice(0,12); save(LAYER_KEY,state.layerCombos); pushToast("Layer combo saved"); render(); };
 const logLayer=document.getElementById("logLayerComboAsWear"); if(logLayer) logLayer.onclick=()=>{ const base=allCollection().find(f=>f.name===state.layerBase); if(!base) return; state.wearLog.unshift({date:new Date().toISOString().slice(0,10),fragrance:base.name,house:base.house,occasion:state.layerOccasion,amount:`${document.getElementById("layerBaseSprays")?.value||state.layerBaseSprays} base + ${document.getElementById("layerTopSprays")?.value||state.layerTopSprays} top`,notes:`Layered with ${state.layerTop}`,layerWith:state.layerTop}); save(WEAR_KEY,state.wearLog); pushToast("Layer combo logged"); render(); };
 const analyzeBuy=document.getElementById("analyzeBuy"); if(analyzeBuy) analyzeBuy.onclick=()=>{ state.buy={...state.buyDraft}; render(); };
 const resetBuy=document.getElementById("resetBuy"); if(resetBuy) resetBuy.onclick=()=>{ state.buyDraft={name:"",house:"",inspiration:"",dna:"",occasion:"",season:"All Season"}; state.buy={...state.buyDraft}; render(); };
 const addWish=document.getElementById("addWishlistItem"); if(addWish) addWish.onclick=()=>{ if(!(state.wishlistDraft.name||"").trim()) return pushToast("Wishlist name is required.","error"); state.wishlist.unshift({...state.wishlistDraft}); save(WISHLIST_KEY,state.wishlist); state.wishlistDraft={name:"",house:"",why:"",priority:"Sample First",price:""}; pushToast("Wishlist item added"); render(); };
 bindValue("collectionSearch",v=>{ state.collectionSearch=v; render(); }); bindValue("collectionTab",v=>{ state.collectionTab=v; render(); }); bindValue("collectionHouseFilter",v=>{ state.collectionHouseFilter=v; render(); }); bindValue("collectionDNAFilter",v=>{ state.collectionDNAFilter=v; render(); }); bindValue("collectionInspirationFilter",v=>{ state.collectionInspirationFilter=v; render(); }); bindValue("collectionPlaneFilter",v=>{ state.collectionPlaneFilter=v; render(); }); bindValue("collectionSort",v=>{ state.collectionSort=v; render(); });
 bindValue("homeOccasion",v=>{ state.homeOccasion=v; render(); }); bindValue("homeEnvironment",v=>{ state.homeEnvironment=v; render(); });
 bindValue("analyzerHouse",v=>state.analyzerDraft.house=v); bindValue("analyzerName",v=>state.analyzerDraft.name=v); bindValue("analyzerInspiration",v=>state.analyzerDraft.inspiration=v); bindValue("analyzerNotes",v=>state.analyzerDraft.notes=v);
 bindValue("newFragranceHouse",v=>state.newFragrance.house=v); bindValue("newFragranceName",v=>state.newFragrance.name=v); bindValue("newFragranceInspiration",v=>state.newFragrance.inspiration=v); bindValue("newFragranceDNA",v=>state.newFragrance.dna=v); bindValue("newFragranceOccasion",v=>state.newFragrance.occasion=v); bindValue("newFragranceSeason",v=>state.newFragrance.season=v);
 bindValue("wearOccasion",v=>{ state.wearOccasion=v; render(); }); bindValue("wearEnvironment",v=>{ state.wearEnvironment=v; render(); }); bindValue("wearSelectedSearch",v=>state.wearSelected=v); bindValue("wearLayerSecondSearch",v=>state.wearLayerSecond=v); bindValue("wearLayerSecondSprays",v=>state.wearLayerSecondSprays=Number(v||1)); bindValue("wearDate",v=>state.wearDate=v); bindValue("wearAmount",v=>state.wearAmount=v); bindValue("wearNotes",v=>state.wearNotes=v); bindValue("wearLogSearch",v=>{ state.wearLogSearch=v; render(); }); bindValue("wearLogOccasionFilter",v=>{ state.wearLogOccasionFilter=v; render(); }); bindValue("wearLogDateFrom",v=>{ state.wearLogDateFrom=v; render(); }); bindValue("wearLogDateTo",v=>{ state.wearLogDateTo=v; render(); });
 bindValue("layerBaseSearch",v=>state.layerBase=v); bindValue("layerTopSearch",v=>state.layerTop=v); bindValue("layerBaseSprays",v=>state.layerBaseSprays=Number(v||2)); bindValue("layerTopSprays",v=>state.layerTopSprays=Number(v||1)); bindValue("layerProjectionMode",v=>state.layerProjectionMode=v); bindValue("layerOccasion",v=>state.layerOccasion=v);
 bindValue("seasonMode",v=>{ state.seasonMode=v; render(); });
 bindValue("buyName",v=>state.buyDraft.name=v); bindValue("buyHouse",v=>state.buyDraft.house=v); bindValue("buyInspiration",v=>state.buyDraft.inspiration=v); bindValue("buyDNA",v=>state.buyDraft.dna=v); bindValue("buyOccasion",v=>state.buyDraft.occasion=v);
 bindValue("wishlistName",v=>state.wishlistDraft.name=v); bindValue("wishlistHouse",v=>state.wishlistDraft.house=v); bindValue("wishlistWhy",v=>state.wishlistDraft.why=v); bindValue("wishlistPriority",v=>state.wishlistDraft.priority=v); bindValue("wishlistPrice",v=>state.wishlistDraft.price=v);
}
render();
